<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gbago Endowment Fund</title>
<meta name="theme-color" content="#0F5132"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GEF"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,30..100&family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#F5F0E6;--bgc:#FFFEFB;--bge:#FFF;--ink:#14201A;--inks:#4A554E;--inkm:#8A8E89;--ln:#E2D9C8;--lnk:#C8BCA4;--grn:#0F5132;--grnd:#0A3D24;--grns:#E6EFE9;--gld:#C99A2E;--glds:#F4E6BF;--nvy:#1B3B6F;--red:#A33A2E;--reds:#F4E1DD;--r:10px;--rl:16px;--sh:0 4px 16px rgba(20,32,26,.07);--f:'Geist','Inter',system-ui,sans-serif;--fs:'Fraunces','Times New Roman',serif;--fm:'Geist Mono',ui-monospace,monospace;--hh:56px}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-feature-settings:'tnum' 1}
h1,h2,h3{font-family:var(--fs);font-weight:500;letter-spacing:-.01em;margin:0}
h1{font-size:clamp(2rem,5vw,3.2rem);line-height:1.05;font-variation-settings:'opsz' 144,'SOFT' 30}
h2{font-size:clamp(1.3rem,3vw,1.9rem);line-height:1.15;font-variation-settings:'opsz' 72}
h3{font-size:1.05rem;font-family:var(--f);font-weight:600;letter-spacing:0}
p{margin:0 0 .8em}a{color:var(--grn)}
.num{font-family:var(--fm);font-variant-numeric:tabular-nums;letter-spacing:-.01em}

/* === APP SHELL === */
.app{min-height:100vh;display:flex;flex-direction:column}
.app-header{background:var(--grnd);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-top{display:flex;align-items:center;gap:12px;padding:0 16px;height:var(--hh)}
.brand-mark{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0}
.brand-mark img{width:100%;height:100%;object-fit:cover}
.brand-name{font-family:var(--fs);font-size:1.05rem;color:#fff;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.month-sel{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:4px 8px 4px 12px}
.month-sel label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);white-space:nowrap}
.month-sel select{background:transparent;border:0;color:#fff;font-family:var(--f);font-size:.88rem;padding:4px 6px;cursor:pointer}
.month-sel select option{background:var(--grnd);color:#fff}
.tab-nav{display:flex;border-top:1px solid rgba(255,255,255,.15)}
.tab-btn{flex:1;background:transparent;border:0;color:rgba(255,255,255,.65);font-family:var(--f);font-size:.82rem;font-weight:500;padding:10px 4px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.02em}
.tab-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab-btn:hover{color:rgba(255,255,255,.9)}
.tab-btn.active{color:#fff;border-bottom-color:var(--gld)}
.app-main{flex:1;padding:20px clamp(14px,4vw,36px) 32px;max-width:1180px;margin:0 auto;width:100%}
.tab-pane{display:none}.tab-pane.active{display:block}

/* === HERO === */
.hero{background:linear-gradient(165deg,var(--grnd) 0%,var(--grn) 55%,#0E6B40 100%);border-radius:var(--rl);padding:clamp(24px,4vw,44px);position:relative;overflow:hidden;margin-bottom:28px;box-shadow:var(--sh);color:#F5F0E6}
.hero::before{content:'';position:absolute;top:-40%;right:-5%;width:45%;height:180%;background:radial-gradient(circle,rgba(201,154,46,.2) 0,transparent 60%);pointer-events:none}
.hero-ey{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--glds);margin-bottom:6px}
.hero-val{font-family:var(--fs);font-size:clamp(2.2rem,5vw,3.6rem);color:#fff;line-height:1;margin:8px 0;font-variation-settings:'opsz' 144}
.hero-sub{font-family:var(--fs);font-style:italic;font-size:.95rem;color:rgba(255,254,251,.72);max-width:480px}
.hero-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:20px;margin-top:28px;padding-top:22px;border-top:1px solid rgba(255,254,251,.18)}
.hs-lbl{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,254,251,.58);margin-bottom:4px}
.hs-val{font-family:var(--fs);font-size:clamp(1.3rem,3vw,1.9rem);line-height:1}
.hs-sub{font-size:.78rem;color:rgba(255,254,251,.6);margin-top:3px}

/* === CARDS === */
.card{background:var(--bgc);border:1px solid var(--ln);border-radius:var(--rl);padding:clamp(16px,2.5vw,28px);box-shadow:0 1px 3px rgba(20,32,26,.05)}
.grid2{display:grid;grid-template-columns:1.1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:780px){.grid2,.grid3{grid-template-columns:1fr}}
.sec{margin-bottom:40px}
.sec-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.sec-hd h2{color:var(--grnd)}
.sec-meta{font-size:.8rem;color:var(--inkm)}

/* === TABLES === */
.stmt{width:100%;border-collapse:collapse;font-size:.93rem}
.stmt th,.stmt td{padding:9px 0;text-align:left}
.stmt th{font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--inkm);border-bottom:1px solid var(--ln)}
.stmt td.r{text-align:right;font-family:var(--fm);font-variant-numeric:tabular-nums}
.stmt tr.ind td:first-child{padding-left:14px;color:var(--inks)}
.stmt tr.ind td.r{color:var(--inks)}
.stmt tr.tot td{border-top:1px solid var(--ln);padding-top:12px;font-weight:600}
.stmt tr.gt td{border-top:2px solid var(--ink);padding-top:12px;font-family:var(--fs);font-size:1.05rem}
.stmt .neg{color:var(--red)}
.stmt .dash{color:var(--inkm);font-style:italic}
.itbl{width:100%;border-collapse:collapse;font-size:.88rem}
.itbl th{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--inkm);border-bottom:1px solid var(--ln);padding:8px 6px;text-align:left}
.itbl td{padding:10px 6px;border-bottom:1px solid var(--ln)}
.itbl tr:last-child td{border-bottom:0}
.itbl td.r{text-align:right;font-family:var(--fm);font-variant-numeric:tabular-nums}
.itbl tr.tot td{font-weight:600;border-top:2px solid var(--ink);border-bottom:0;padding-top:12px}

/* === PILLS & BADGES === */
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:.72rem;font-weight:500;letter-spacing:.04em;background:var(--grns);color:var(--grnd)}
.pill.gld{background:var(--glds);color:#6B4F0E}.pill.nvy{background:#DDE5F0;color:var(--nvy)}.pill.red{background:var(--reds);color:var(--red)}

/* === BUTTONS === */
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--grn);color:#FFFEFB;border:1px solid var(--grn);border-radius:999px;padding:8px 16px;font-family:var(--f);font-size:.88rem;font-weight:500;cursor:pointer;transition:transform .1s,background .1s;text-decoration:none}
.btn:hover{background:var(--grnd);transform:translateY(-1px)}
.btn.gh{background:transparent;color:var(--grn);border-color:var(--lnk)}.btn.gh:hover{background:var(--grns)}
.btn.gld{background:var(--gld);border-color:var(--gld);color:#2C2106}.btn.gld:hover{background:#B5871F}
.btn.dng{background:transparent;color:var(--red);border-color:var(--reds)}.btn.dng:hover{background:var(--reds)}
.btn.sm{padding:4px 10px;font-size:.78rem}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* === FORMS === */
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--inkm);font-weight:500}
.fld input,.fld select,.fld textarea{font-family:var(--f);font-size:.92rem;padding:8px 11px;border:1px solid var(--lnk);border-radius:var(--r);background:var(--bge);color:var(--ink);width:100%}
.fld input[type=number]{font-family:var(--fm);font-variant-numeric:tabular-nums;text-align:right}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:2px solid var(--grns);border-color:var(--grn)}
.fld textarea{min-height:80px;resize:vertical;font-family:var(--f)}
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.erow{display:grid;align-items:end;gap:8px;padding:10px;background:var(--bge);border:1px solid var(--ln);border-radius:var(--r)}
.rlist{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.rack{display:flex;gap:6px;justify-content:flex-end;align-items:flex-end}
.addbox{background:var(--grns);border:1px dashed #B6D0BC;border-radius:var(--r);padding:12px;margin-top:10px}

/* === INNER TABS (admin) === */
.itabs{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid var(--ln);margin-bottom:20px}
.itab{background:transparent;border:0;padding:8px 12px;font-family:var(--f);font-size:.84rem;font-weight:500;color:var(--inkm);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.itab:hover{color:var(--ink)}.itab.active{color:var(--grnd);border-bottom-color:var(--gld)}

/* === MISC === */
.narr{background:var(--bgc);border:1px solid var(--ln);border-left:3px solid var(--gld);padding:18px 22px;border-radius:var(--r);font-family:var(--fs);font-size:1rem;line-height:1.55;color:var(--ink)}
.narr p{margin:0}.narr.g{border-left-color:var(--grn)}
.nxts{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
.nxt{padding:18px;border:1px solid var(--ln);border-radius:var(--r);background:var(--bgc)}
.nxt-n{font-family:var(--fs);font-size:2.2rem;color:var(--gld);line-height:1;margin-bottom:6px;opacity:.65}
.nxt h4{font-size:.9rem;margin:0 0 5px;color:var(--grnd);font-weight:600;font-family:var(--f)}
.nxt p{font-size:.84rem;color:var(--inks);margin:0}
.acct-card{background:var(--bgc);border:1px solid var(--ln);border-radius:var(--r);margin-bottom:14px}
.acct-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--ln);background:var(--grns);border-radius:var(--r) var(--r) 0 0}
.acct-body{padding:14px 16px}
.banner{padding:10px 14px;border-radius:var(--r);font-size:.88rem;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.banner.ok{background:var(--grns);color:var(--grnd);border:1px solid #C8DCC9}
.banner.warn{background:var(--glds);color:#6B4F0E;border:1px solid #E0CB85}
.banner.err{background:var(--reds);color:var(--red);border:1px solid #E5C2BD}
.login-shell{min-height:60vh;display:grid;place-items:center;padding:40px 20px}
.login-card{width:100%;max-width:400px;background:var(--bgc);border:1px solid var(--ln);border-radius:var(--rl);padding:32px;box-shadow:var(--sh);text-align:center}
.login-card h2{color:var(--grnd);margin-bottom:8px}
.login-logo{width:54px;height:54px;border-radius:50%;overflow:hidden;margin:0 auto 14px;border:2px solid var(--grns)}
.login-logo img{width:100%;height:100%;object-fit:cover}
.etxt{color:var(--red);font-size:.82rem;margin-top:6px}
.chart-w{position:relative}.chart-w.dn{height:230px}.chart-w.wf{height:260px}
.spacer{height:20px}
.fb{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fbw{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.muted{color:var(--inkm)}
.empty-s{text-align:center;padding:40px 20px;color:var(--inkm)}
.empty-s h3{font-family:var(--fs);margin-bottom:8px;color:var(--inks)}
.hidden{display:none!important}
.ver{position:fixed;bottom:8px;right:12px;font-size:.65rem;color:var(--inkm);letter-spacing:.08em;z-index:50;pointer-events:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--grnd);color:#fff;padding:10px 20px;border-radius:999px;font-size:.88rem;box-shadow:var(--sh);z-index:200;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
.sw-banner{background:var(--glds);color:#6B4F0E;text-align:center;padding:8px 16px;font-size:.84rem;border-bottom:1px solid #E0CB85}
</style>
</head>
<body>
<div id="sw-banner" class="sw-banner hidden">New version available. <a href="" onclick="location.reload()">Refresh</a> to update.</div>
<div class="app">

<!-- ===== HEADER ===== -->
<header class="app-header">
  <div class="hdr-top">
    <div class="brand-mark"><img src="icon-192.png" alt="GEF"/></div>
    <div class="brand-name">Gbago Endowment Fund</div>
    <div id="month-wrap" class="month-sel hidden">
      <label>Period</label>
      <select id="month-sel"></select>
    </div>
  </div>
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="dashboard">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </button>
    <button class="tab-btn" data-tab="report">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
      Report
    </button>
    <button class="tab-btn" data-tab="admin">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/><path d="M16 11l1.5 3h3l-2.5 2 1 3L16 17.5 13 19l1-3-2.5-2h3z"/></svg>
      Admin
    </button>
    <button class="tab-btn" data-tab="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </nav>
</header>

<!-- ===== MAIN CONTENT ===== -->
<main class="app-main">
  <div id="tab-dashboard" class="tab-pane active"><div id="dash-content"></div></div>
  <div id="tab-report"    class="tab-pane"><div id="rpt-content"></div></div>
  <div id="tab-admin"     class="tab-pane"><div id="adm-content"></div></div>
  <div id="tab-settings"  class="tab-pane"><div id="cfg-content"></div></div>
</main>
</div>

<div class="ver" id="ver-badge">V1.00.0</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// EDIT BEFORE DEPLOYING
// ============================================================
const ADMIN_PASSPHRASE = 'gbago-admin';
const DEFAULT_REPO     = '';
const DEFAULT_BRANCH   = 'main';
const APP_VERSION      = 'V1.00.0';
// ============================================================

const GEF = (function(){
  const UOF_CATS = {
    jambForm:'JAMB Form', waecForm:'WAEC Form', lesson:'Lesson / Tuition',
    stipend:'Stipend', scholarship:'Scholarship', gift:'Gift / Donation', other:'Other'
  };
  function fmtM(v,plain){
    var sym=plain?'':'\u20A6', n=Number(v||0), a=Math.abs(n);
    var f=a.toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
    return n<0?'('+(plain?'':sym)+f+')':sym+f;
  }
  function fmtPct(v,d){return(Number(v||0)*100).toFixed(d==null?2:d)+'%';}
  function pLabel(p){if(p.label)return p.label;var m=['January','February','March','April','May','June','July','August','September','October','November','December'];return m[p.month-1]+' '+p.year;}
  function sum(arr,k){return(arr||[]).reduce(function(a,i){return a+Number((k?i[k]:i)||0);},0);}
  function acctBal(a){
    return(a.transactions||[]).reduce(function(b,t){
      if(['deposit','topup','income','rollover'].includes(t.type))return b+Number(t.amount||0);
      return b-Number(t.amount||0);
    },Number(a.openingBalance||0));
  }
  function acctIncome(a){return(a.transactions||[]).filter(function(t){return t.type==='income';}).reduce(function(s,t){return s+Number(t.amount||0);},0);}
  function acctFees(a){return(a.transactions||[]).filter(function(t){return t.type==='fee';}).reduce(function(s,t){return s+Number(t.amount||0);},0);}
  function allAccts(p){return[].concat(p.cashAccounts||[],p.moneyMarketAccounts||[],p.placements||[]);}

  function pnl(p){
    var don=sum(p.donations,'amount'), oi=sum(p.otherIncome,'amount');
    var invInc=allAccts(p).reduce(function(s,a){return s+acctIncome(a);},0);
    var rev=don+oi+invInc;
    var uofByC={};Object.keys(UOF_CATS).forEach(function(c){uofByC[c]=(p.useOfFunds||[]).filter(function(u){return u.category===c;}).reduce(function(s,u){return s+Number(u.amount||0);},0);});
    var totalUof=sum(p.useOfFunds,'amount');
    var oe=sum(p.otherExpenses,'amount');
    var fees=allAccts(p).reduce(function(s,a){return s+acctFees(a);},0);
    var exp=totalUof+oe+fees;
    return{donations:don,otherIncome:oi,investmentIncome:invInc,totalRevenue:rev,uofByC:uofByC,totalUof:totalUof,otherExpenses:oe,fees:fees,totalExpenses:exp,netIncome:rev-exp};
  }
  function bs(p){
    var cash=(p.cashAccounts||[]).reduce(function(s,a){return s+acctBal(a);},0);
    var mm=(p.moneyMarketAccounts||[]).reduce(function(s,a){return s+acctBal(a);},0);
    var fd=(p.placements||[]).reduce(function(s,a){return s+acctBal(a);},0);
    return{cash:cash,moneyMarket:mm,placements:fd,totalAssets:cash+mm+fd,netAssets:cash+mm+fd};
  }
  function cf(p){
    var r=pnl(p),b=bs(p);
    var obCash=(p.cashAccounts||[]).reduce(function(s,a){return s+Number(a.openingBalance||0);},0);
    var obMM=(p.moneyMarketAccounts||[]).reduce(function(s,a){return s+Number(a.openingBalance||0);},0);
    var obFD=(p.placements||[]).reduce(function(s,a){return s+Number(a.openingBalance||0);},0);
    var op={don:r.donations,oi:r.otherIncome,uof:-r.totalUof};
    op.sub=op.don+op.oi+op.uof;
    var inv={inc:r.investmentIncome,netMM:-(b.moneyMarket-obMM),netFD:-(b.placements-obFD),fees:-(r.otherExpenses+r.fees)};
    inv.sub=inv.inc+inv.netMM+inv.netFD+inv.fees;
    var openCash=obCash, change=op.sub+inv.sub, computed=openCash+change, booked=b.cash;
    return{op:op,inv:inv,cashChange:change,openCash:openCash,computed:computed,booked:booked,ok:Math.abs(computed-booked)<1};
  }
  function invSum(p){
    var all=allAccts(p);
    var tot=all.reduce(function(s,a){return s+acctBal(a);},0);
    return{total:tot};
  }
  function newId(pfx){return(pfx||'x')+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);}

// ---- Statement builder ----
function buildStmt(rows){
  var html='<table class="stmt"><tbody>';
  rows.forEach(function(row){
    if(row.h!==undefined){var pad=html.includes('</tr>')?'padding-top:16px;':'';html+='<tr><th style="'+pad+'">'+row.h+'</th><th class="r">'+(row.col||'')+'</th></tr>';return;}
    var cls=row.ind?'ind':'';if(row.tot)cls='tot';if(row.gt)cls='gt';
    var neg=row.v<0;
    var vhtml;
    if(row.dz&&row.v===0)vhtml='<span class="dash">\u2014</span>';
    else vhtml=GEF.fmtM(row.v);
    html+='<tr class="'+cls+'"><td>'+row.l+'</td><td class="r'+(neg?' neg':'')+'">'+vhtml+'</td></tr>';
  });
  return html+'</tbody></table>';
}

  else if(allIds.length){selectAdmPeriod(allIds[0]);}
  else{renderAdmPeriodEditor();}
}

function renderAdmPeriodList(){
  var wrap=document.getElementById('adm-period-list');if(!wrap)return;wrap.innerHTML='';
  var pubIds=(S.pubIdx&&S.pubIdx.publishedPeriods||[]).map(function(p){return p.id;});
  var allIds=Array.from(new Set(Object.keys(S.drafts).concat(pubIds))).sort().reverse();
  if(!allIds.length){wrap.innerHTML='<div class="muted" style="padding:8px 0;font-size:.85rem;">No periods yet. Create the first one below.</div>';return;}
  allIds.forEach(function(id){
    var meta=(S.pubIdx&&S.pubIdx.publishedPeriods||[]).find(function(p){return p.id===id;});
    var isDraft=!!S.drafts[id],isPubF=!!meta;
    var div=document.createElement('div');div.className='fbw';div.style.cssText='padding:8px 10px;border:1px solid var(--ln);border-radius:var(--r);background:var(--bge);margin-bottom:5px;';
    if(S.aperiod&&S.aperiod.id===id)div.style.borderColor='var(--grn)';
    var lbl=(meta?meta.label:(S.drafts[id]&&S.drafts[id].label)||id);
    var lft='<div class="fb"><strong style="font-size:.9rem;">'+lbl+'</strong><span class="muted" style="font-size:.76rem;">'+id+'</span>';
    if(isPubF)lft+='<span class="pill">Published</span>';
    if(isDraft&&!isPubF)lft+='<span class="pill gld">Draft</span>';
    if(isDraft&&isPubF)lft+='<span class="pill nvy">Edited</span>';
    lft+='</div>';
    var rgt=document.createElement('div');rgt.className='fb';
    var eb=document.createElement('button');eb.className='btn sm';eb.textContent=(S.aperiod&&S.aperiod.id===id)?'Editing':'Open';eb.disabled=(S.aperiod&&S.aperiod.id===id);eb.addEventListener('click',function(){selectAdmPeriod(id);});rgt.appendChild(eb);
    if(isPubF){var ub=document.createElement('button');ub.className='btn sm dng';ub.textContent='Unpublish';ub.addEventListener('click',function(){unpublish(id);});rgt.appendChild(ub);}
    if(isDraft){var db=document.createElement('button');db.className='btn sm gh';db.textContent='Discard';db.addEventListener('click',function(){deleteDraft(id);});rgt.appendChild(db);}
    div.innerHTML=lft;div.appendChild(rgt);wrap.appendChild(div);
  });
}

function selectAdmPeriod(id){
  if(S.drafts[id]){S.aperiod=S.drafts[id];sessionStorage.setItem(LS.CUR,id);renderAdmPeriodEditor();renderAdmPeriodList();return;}
  if(isPub(id)){fetchJSON('data/periods/'+id+'.json').then(function(p){S.aperiod=p;S.drafts[id]=p;saveDrafts();sessionStorage.setItem(LS.CUR,id);renderAdmPeriodEditor();renderAdmPeriodList();}).catch(function(e){toast('Load failed: '+e.message,'err');});}
}

// --- Line section builder ---
function lsec(spec){
  var card=document.createElement('div');card.className='card';card.style.marginBottom='16px';
  var p=S.aperiod;var items=(p&&p[spec.cat])||[];var total=GEF.sum(items,'amount');
  card.innerHTML='<div class="fbw" style="margin-bottom:6px;"><h3>'+spec.title+'</h3><div class="muted num" style="font-size:.9rem;">\u20A6'+GEF.fmtM(total,true)+'</div></div>'
    +'<p class="muted" style="font-size:.82rem;margin-bottom:6px;">'+spec.sub+'</p>';
  var rl=document.createElement('div');rl.className='rlist';
  if(!items.length){var em=document.createElement('div');em.className='muted';em.style.cssText='font-size:.84rem;font-style:italic;padding:6px 0;';em.textContent='No entries.';rl.appendChild(em);}
  items.forEach(function(item){
    var row=document.createElement('div');row.className='erow';
    row.style.gridTemplateColumns=spec.cols.map(function(c){return c.w||'1fr';}).concat(['70px']).join(' ');
    spec.cols.forEach(function(col){
      var fld=document.createElement('div');fld.className='fld';fld.innerHTML='<label>'+col.l+'</label>';
      var inp=document.createElement('input');inp.type=col.t;if(col.t==='number')inp.step='0.01';inp.value=item[col.k]!=null?item[col.k]:'';
      inp.addEventListener('input',function(e){item[col.k]=col.t==='number'?Number(e.target.value||0):e.target.value;autoSave();if(col.k==='amount'){card.querySelector('.muted.num').textContent='\u20A6'+GEF.fmtM(GEF.sum(p[spec.cat],'amount'),true);}});
      fld.appendChild(inp);row.appendChild(fld);
    });
    var act=document.createElement('div');act.className='rack';
    var del=document.createElement('button');del.className='btn sm dng';del.textContent='Remove';
    del.addEventListener('click',function(){p[spec.cat]=p[spec.cat].filter(function(x){return x.id!==item.id;});autoSave();renderAdmPeriodEditor();});
    act.appendChild(del);row.appendChild(act);rl.appendChild(row);
  });
  card.appendChild(rl);
  var ab=document.createElement('button');ab.className='btn sm';ab.style.marginTop='10px';ab.textContent=spec.addLbl;
  ab.addEventListener('click',function(){if(!p[spec.cat])p[spec.cat]=[];var fr={};spec.cols.forEach(function(c){fr[c.k]=c.t==='number'?0:'';});fr.id=GEF.newId(spec.cat);p[spec.cat].push(fr);autoSave();renderAdmPeriodEditor();});
  card.appendChild(ab);return card;
}

// ---- Settings ----
function renderSettings(){
  var el=document.getElementById('cfg-content');el.innerHTML='';
  if(!S.authed){el.innerHTML='<div class="login-shell"><div class="login-card"><div class="login-logo"><img src="icon-192.png" alt="GEF"/></div><h2>Sign in first</h2><p style="color:var(--inks);">Visit the Admin tab to sign in.</p></div></div>';return;}
  var html='<div class="card" style="margin-bottom:20px;"><h3 style="margin-bottom:12px;color:var(--grnd);">GitHub Publishing</h3>'
    +'<p class="muted" style="font-size:.84rem;margin-bottom:14px;">The PAT is stored only in this browser. Create a fine-grained PAT with <strong>Contents: Read and Write</strong> on the target repo only.</p>'
    +'<div class="frow">'
    +'<div class="fld"><label>Repo</label><input type="text" id="cfg-repo" placeholder="username/repo-name" value="'+esc(S.repo)+'"/></div>'
    +'<div class="fld"><label>Branch</label><input type="text" id="cfg-branch" value="'+esc(S.branch||'main')+'"/></div>'
    +'<div class="fld" style="grid-column:span 2;"><label>GitHub PAT</label><input type="password" id="cfg-pat" placeholder="ghp_..." autocomplete="off" value="'+(S.pat?'••••••••':'')+'" /></div>'
    +'</div><div class="fb" style="margin-top:12px;">'
    +'<button class="btn" id="cfg-save">Save</button>'
    +'<button class="btn gh" id="cfg-test">Test connection</button>'
    +'<button class="btn dng" id="cfg-clear">Clear token</button>'
    +'</div></div>'
    +'<div class="card" style="margin-bottom:20px;"><h3 style="margin-bottom:12px;color:var(--grnd);">Data</h3>'
    +'<div class="fb"><button class="btn gh" id="cfg-export">Export all drafts (JSON)</button></div></div>'
    +'<div class="card"><h3 style="margin-bottom:8px;color:var(--grnd);">About</h3>'
    +'<p style="font-size:.9rem;color:var(--inks);">Gbago Endowment Fund Portal &middot; <strong>'+APP_VERSION+'</strong></p>'
    +'<p style="font-size:.82rem;color:var(--inkm);">Single-file PWA. Change the passphrase by editing <code>ADMIN_PASSPHRASE</code> in <code>index.html</code> before deploying.</p></div>';
  el.innerHTML=html;
  el.querySelector('#cfg-save').addEventListener('click',function(){
    S.repo=(el.querySelector('#cfg-repo').value||'').trim();
    S.branch=(el.querySelector('#cfg-branch').value||'').trim()||'main';
    var np=(el.querySelector('#cfg-pat').value||'').trim();if(np&&!np.startsWith('\u2022'))S.pat=np;
    localStorage.setItem(LS.REPO,S.repo);localStorage.setItem(LS.BR,S.branch);if(S.pat)localStorage.setItem(LS.PAT,S.pat);
    toast('Settings saved','ok');renderSettings();
  });
  el.querySelector('#cfg-test').addEventListener('click',testGH);
  el.querySelector('#cfg-clear').addEventListener('click',function(){if(!confirm('Clear stored GitHub token?'))return;S.pat='';localStorage.removeItem(LS.PAT);toast('Token cleared','ok');renderSettings();});
  el.querySelector('#cfg-export').addEventListener('click',function(){var blob=new Blob([JSON.stringify(S.drafts,null,2)],{type:'application/json'});var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download='gef-drafts.json';a.click();URL.revokeObjectURL(u);});
}

// ---- Draft / period management ----
function loadDrafts(){try{S.drafts=JSON.parse(localStorage.getItem(LS.DR)||'{}')||{};}catch(e){S.drafts={};}}
function saveDrafts(){localStorage.setItem(LS.DR,JSON.stringify(S.drafts));}
function autoSave(){if(S.aperiod){S.drafts[S.aperiod.id]=S.aperiod;saveDrafts();}}
function saveDraft(){autoSave();toast('Draft saved','ok');}
function deleteDraft(id){if(!confirm('Delete draft for '+id+'?'))return;delete S.drafts[id];saveDrafts();if(S.aperiod&&S.aperiod.id===id)S.aperiod=null;renderAdmin();}
function isPub(id){return S.pubIdx&&(S.pubIdx.publishedPeriods||[]).some(function(p){return p.id===id;});}

function newPeriod(){
  var yr=parseInt(document.getElementById('new-yr').value,10);
  var mo=parseInt(document.getElementById('new-mo').value,10);
  if(!yr||!mo||mo<1||mo>12){toast('Enter a valid year and month','err');return;}
  var id=yr+'-'+String(mo).padStart(2,'0');
  if(S.drafts[id]||isPub(id)){toast('Period '+id+' already exists','err');return;}
  var p=GEF.blank(yr,mo);p.label=GEF.pLabel(p);
  var allIds=Array.from(new Set(Object.keys(S.drafts).concat((S.pubIdx&&S.pubIdx.publishedPeriods||[]).map(function(x){return x.id;})))).filter(function(x){return x<id;}).sort();
  var prevId=allIds[allIds.length-1];
  function proceed(prev){
    if(prev){var c=GEF.carry(prev);if(c){p.cashAccounts=c.cashAccounts;p.moneyMarketAccounts=c.moneyMarketAccounts;p.placements=c.placements;}}
    S.drafts[id]=p;saveDrafts();S.aperiod=p;sessionStorage.setItem(LS.CUR,id);
    renderAdmPeriodList();renderAdmPeriodEditor();
    var msg='Created '+id;if(prev)msg+=' (balances carried from '+prev.id+')';toast(msg,'ok');
  }
  if(prevId){if(S.drafts[prevId])proceed(S.drafts[prevId]);else fetchJSON('data/periods/'+prevId+'.json').then(proceed).catch(function(){proceed(null);});}
  else proceed(null);
}

// ---- GitHub publish ----
async function ghGet(path){if(!S.repo||!S.pat)throw new Error('Configure repo and token first.');var r=await fetch('https://api.github.com/repos/'+S.repo+'/contents/'+path+'?ref='+encodeURIComponent(S.branch),{headers:{Accept:'application/vnd.github+json',Authorization:'token '+S.pat,'X-GitHub-Api-Version':'2022-11-28'}});if(r.status===404)return null;if(!r.ok)throw new Error('GitHub GET '+r.status);return r.json();}
async function ghPut(path,content,msg,sha){if(!S.repo||!S.pat)throw new Error('Configure repo and token first.');var body={message:msg,content:btoa(unescape(encodeURIComponent(content))),branch:S.branch};if(sha)body.sha=sha;var r=await fetch('https://api.github.com/repos/'+S.repo+'/contents/'+path,{method:'PUT',headers:{Accept:'application/vnd.github+json',Authorization:'token '+S.pat,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error('GitHub PUT '+r.status+': '+await r.text());return r.json();}
async function testGH(){toast('Testing connection\u2026','ok');try{var r=await fetch('https://api.github.com/repos/'+S.repo,{headers:{Accept:'application/vnd.github+json',Authorization:'token '+S.pat}});if(!r.ok)throw new Error(r.status);var d=await r.json();toast('Connected: '+d.full_name,'ok');}catch(e){toast('Test failed: '+e.message,'err');}}
async function publish(){
  if(!S.aperiod){toast('No period selected','err');return;}
  if(!S.repo||!S.pat){toast('Configure GitHub settings first','err');return;}
  var cf=GEF.cf(S.aperiod);
  if(!cf.ok&&!confirm('Cash gap: computed '+GEF.fmtM(cf.computed)+' vs booked '+GEF.fmtM(cf.booked)+'. Publish anyway?'))return;
  toast('Publishing\u2026','ok');
  try{
    var pp='data/periods/'+S.aperiod.id+'.json';
    var existing=await ghGet(pp),idxFile=await ghGet('data/index.json');
    var toSave=JSON.parse(JSON.stringify(S.aperiod));toSave.publishedAt=new Date().toISOString();
    await ghPut(pp,JSON.stringify(toSave,null,2),'Publish '+S.aperiod.id,existing&&existing.sha);
    var idx;try{idx=idxFile?JSON.parse(decodeURIComponent(escape(atob(idxFile.content.replace(/\n/g,''))))):S.pubIdx;}catch(e){idx=S.pubIdx;}
    idx.publishedPeriods=(idx.publishedPeriods||[]).filter(function(p){return p.id!==S.aperiod.id;});
    idx.publishedPeriods.push({id:S.aperiod.id,label:S.aperiod.label||GEF.pLabel(S.aperiod),year:S.aperiod.year,month:S.aperiod.month,publishedAt:toSave.publishedAt});
    idx.publishedPeriods.sort(function(a,b){return a.id.localeCompare(b.id);});idx.lastUpdated=new Date().toISOString();
    await ghPut('data/index.json',JSON.stringify(idx,null,2),'Update index for '+S.aperiod.id,idxFile&&idxFile.sha);
    delete S.drafts[S.aperiod.id];saveDrafts();S.pubIdx=idx;
    toast('Published. GitHub Pages may take ~60s to update.','ok');renderAdmPeriodList();loadIndex();
  }catch(e){toast('Publish failed: '+e.message,'err');}
}
async function unpublish(id){
  if(!confirm('Unpublish '+id+'?'))return;
  try{var f=await ghGet('data/index.json');if(!f)throw new Error('No index.json');var idx=JSON.parse(decodeURIComponent(escape(atob(f.content.replace(/\n/g,'')))));idx.publishedPeriods=(idx.publishedPeriods||[]).filter(function(p){return p.id!==id;});idx.lastUpdated=new Date().toISOString();await ghPut('data/index.json',JSON.stringify(idx,null,2),'Unpublish '+id,f.sha);S.pubIdx=idx;toast('Unpublished '+id,'ok');renderAdmPeriodList();loadIndex();}
  catch(e){toast('Failed: '+e.message,'err');}
}
function dlJSON(){if(!S.aperiod)return;var b=new Blob([JSON.stringify(S.aperiod,null,2)],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=S.aperiod.id+'.json';a.click();URL.revokeObjectURL(u);}
function importJSON(){var inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var obj=JSON.parse(ev.target.result);if(!obj.id){toast('Invalid file: no id','err');return;}S.drafts[obj.id]=obj;saveDrafts();toast('Imported '+obj.id,'ok');selectAdmPeriod(obj.id);}catch(err){toast('Cannot parse JSON','err');}};r.readAsText(f);});inp.click();}

// ---- Charts / Utils ----
function destroyCharts(ids){(ids||Object.keys(S.charts)).forEach(function(id){if(S.charts[id]){try{S.charts[id].destroy();}catch(e){}delete S.charts[id];}});}
function toast(msg,level){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(level||'');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},3500);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ---- Boot ----
async function boot(){
  document.getElementById('ver-badge').textContent=APP_VERSION;
  S.authed=!!sessionStorage.getItem(LS.AUTH);
  document.querySelectorAll('.tab-btn').forEach(function(b){b.addEventListener('click',function(){setTab(b.dataset.tab);});});
  if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').then(function(reg){reg.addEventListener('updatefound',function(){var nw=reg.installing;nw.addEventListener('statechange',function(){if(nw.state==='installed'&&navigator.serviceWorker.controller){document.getElementById('sw-banner').classList.remove('hidden');}});});});}
  var ib=document.getElementById('btn-install');
  var di=null;
  window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();di=e;if(ib)ib.classList.remove('hidden');});
  if(ib)ib.addEventListener('click',function(){if(di){di.prompt();di.userChoice.then(function(){di=null;ib.classList.add('hidden');});}});
  await loadIndex();
  setTab('dashboard');
}

document.addEventListener('DOMContentLoaded',boot);
})();
</script>
