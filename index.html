<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gbago Endowment Fund</title>
<meta name="theme-color" content="#0F5132"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GEF"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,30..100&family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#F2F5F0;--bgc:#FAFCF9;--bge:#FFF;--ink:#0D1F15;--inks:#3A5040;--inkm:#7A8C7E;--ln:#D9E4DC;--lnk:#BECEBC;--grn:#006145;--grnd:#004D37;--grns:#E0EDE6;--gld:#F8C01C;--glds:#FEF3C0;--nvy:#0F2F70;--teal:#007AA3;--brn:#AD7436;--brnl:#F5E9D6;--red:#A33A2E;--reds:#F4E1DD;--r:10px;--rl:16px;--sh:0 4px 16px rgba(0,50,30,.08);--f:'Geist','Inter',system-ui,sans-serif;--fs:'Fraunces','Times New Roman',serif;--fm:'Geist Mono',ui-monospace,monospace;--hh:56px}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:var(--f);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-feature-settings:'tnum' 1}
h1,h2,h3{font-family:var(--fs);font-weight:500;letter-spacing:-.01em;margin:0}
h1{font-size:clamp(2rem,5vw,3.2rem);line-height:1.05;font-variation-settings:'opsz' 144,'SOFT' 30}
h2{font-size:clamp(1.3rem,3vw,1.9rem);line-height:1.15;font-variation-settings:'opsz' 72}
h3{font-size:1.05rem;font-family:var(--f);font-weight:600;letter-spacing:0}
p{margin:0 0 .8em}a{color:var(--grn)}
.num{font-family:var(--fm);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.app{min-height:100vh;display:flex;flex-direction:column}
.app-header{background:var(--grnd);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr-top{display:flex;align-items:center;gap:10px;padding:0 16px;height:var(--hh)}
.brand-mark{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0}
.brand-mark img{width:100%;height:100%;object-fit:cover}
.brand-name{font-family:var(--fs);font-size:1.05rem;color:#fff;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-controls{display:flex;align-items:center;gap:8px;flex-shrink:0}
.month-sel{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:3px 6px 3px 10px}
.month-sel label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);white-space:nowrap}
.month-sel select{background:transparent;border:0;color:#fff;font-family:var(--f);font-size:.78rem;padding:3px 4px;cursor:pointer}
.month-sel select option{background:var(--grnd);color:#fff}
.view-toggle{display:flex;align-items:center;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:999px;overflow:hidden}
.view-toggle button{background:transparent;border:0;color:rgba(255,255,255,.7);font-family:var(--f);font-size:.66rem;font-weight:500;padding:4px 8px;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;transition:background .15s,color .15s}
.view-toggle button.active{background:rgba(255,255,255,.22);color:#fff}
.tab-nav{display:flex;border-top:1px solid rgba(255,255,255,.15)}
.tab-btn{flex:1;min-width:0;min-height:52px;background:transparent;border:0;color:rgba(255,255,255,.65);font-family:var(--f);font-size:.75rem;font-weight:500;padding:8px 2px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.01em;-webkit-tap-highlight-color:transparent}
.tab-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab-btn:hover{color:rgba(255,255,255,.9)}
.tab-btn.active{color:#fff;border-bottom-color:var(--gld)}
.app-main{flex:1;padding:20px clamp(14px,4vw,36px) 32px;max-width:1180px;margin:0 auto;width:100%}
.tab-pane{display:none}.tab-pane.active{display:block}
.hero{background:linear-gradient(165deg,var(--grnd) 0%,var(--grn) 55%,#007A55 100%);border-radius:var(--rl);padding:clamp(24px,4vw,44px);position:relative;overflow:hidden;margin-bottom:28px;box-shadow:var(--sh);color:#F2F5F0}
.hero::before{content:'';position:absolute;top:-40%;right:-5%;width:45%;height:180%;background:radial-gradient(circle,rgba(201,154,46,.2) 0,transparent 60%);pointer-events:none}
.hero-ey{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--glds);margin-bottom:6px}
.hero-val{font-family:var(--fs);font-size:clamp(2.2rem,5vw,3.6rem);color:#fff;line-height:1;margin:8px 0;font-variation-settings:'opsz' 144}
.hero-sub{font-family:var(--fs);font-style:italic;font-size:.95rem;color:rgba(255,254,251,.72);max-width:480px}
.hero-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:20px;margin-top:28px;padding-top:22px;border-top:1px solid rgba(255,254,251,.18)}
.hs-lbl{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,254,251,.58);margin-bottom:4px;white-space:nowrap}
.hs-val{font-family:var(--fs);font-size:clamp(1.3rem,3vw,1.9rem);line-height:1}
.hs-sub{font-size:.78rem;color:rgba(255,254,251,.6);margin-top:3px}
.card{background:var(--bgc);border:1px solid var(--ln);border-radius:var(--rl);padding:clamp(16px,2.5vw,28px);box-shadow:0 1px 3px rgba(20,32,26,.05)}
.grid2{display:grid;grid-template-columns:1.1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:780px){.grid2,.grid3{grid-template-columns:1fr}}
.sec{margin-bottom:40px}
.sec-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.sec-hd h2{color:var(--grnd)}
.sec-meta{font-size:.8rem;color:var(--inkm)}
.stmt{width:100%;border-collapse:collapse;font-size:.93rem}
.stmt th,.stmt td{padding:9px 0;text-align:left;white-space:nowrap}
.stmt th{font-size:.74rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--inkm);border-bottom:1px solid var(--ln)}
.stmt td.r,.stmt th.r{text-align:right;font-family:var(--fm);font-variant-numeric:tabular-nums}
.stmt tr.ind td:first-child{padding-left:14px;color:var(--inks)}
.stmt tr.ind td.r{color:var(--inks)}
.stmt tr.tot td{border-top:1px solid var(--ln);padding-top:12px;font-weight:600}
.stmt tr.gt td{border-top:2px solid var(--ink);padding-top:12px;font-family:var(--fs);font-size:1.05rem}
.stmt .neg{color:var(--red)}
.stmt .dash{color:var(--inkm);font-style:italic}
.stmt tr.clickable{cursor:pointer;transition:background .12s}
.stmt tr.clickable:hover td{background:var(--grns)}
.stmt tr.clickable td:first-child::after{content:' ↗';font-size:.7em;opacity:.4;vertical-align:super}
.itbl{width:100%;border-collapse:collapse;font-size:.88rem}
.itbl th{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--inkm);border-bottom:1px solid var(--ln);padding:8px 6px;text-align:left;white-space:nowrap}
.itbl td{padding:10px 6px;border-bottom:1px solid var(--ln);white-space:nowrap}
.itbl tr:last-child td{border-bottom:0}
.itbl td.r,.itbl th.r{text-align:right;font-family:var(--fm);font-variant-numeric:tabular-nums}
.itbl tr.tot td{font-weight:600;border-top:2px solid var(--ink);border-bottom:0;padding-top:12px}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:.72rem;font-weight:500;letter-spacing:.04em;background:var(--grns);color:var(--grnd);white-space:nowrap}
.pill.gld{background:var(--glds);color:#6B4F0E}.pill.nvy{background:#DDE5F0;color:var(--nvy)}.pill.red{background:var(--reds);color:var(--red)}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--grn);color:#FFFEFB;border:1px solid var(--grn);border-radius:999px;padding:8px 16px;font-family:var(--f);font-size:.88rem;font-weight:500;cursor:pointer;transition:transform .1s,background .1s;text-decoration:none}
.btn:hover{background:var(--grnd);transform:translateY(-1px)}
.btn.gh{background:transparent;color:var(--grn);border-color:var(--lnk)}.btn.gh:hover{background:var(--grns)}
.btn.gld{background:var(--gld);border-color:var(--gld);color:#2C2106}.btn.gld:hover{background:#B5871F}
.btn.dng{background:transparent;color:var(--red);border-color:var(--reds)}.btn.dng:hover{background:var(--reds)}
.btn.sm{padding:4px 10px;font-size:.78rem}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--inkm);font-weight:500}
.fld input,.fld select,.fld textarea{font-family:var(--f);font-size:.92rem;padding:8px 11px;border:1px solid var(--lnk);border-radius:var(--r);background:var(--bge);color:var(--ink);width:100%}
.fld input[type=number]{font-family:var(--fm);font-variant-numeric:tabular-nums;text-align:right}
.fld input:focus,.fld select:focus,.fld textarea:focus{outline:2px solid var(--grns);border-color:var(--grn)}
.fld textarea{min-height:80px;resize:vertical;font-family:var(--f)}
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.erow{display:grid;align-items:end;gap:8px;padding:10px;background:var(--bge);border:1px solid var(--ln);border-radius:var(--r)}
@media(max-width:600px){.erow{grid-template-columns:1fr 1fr!important;}.erow .rack{grid-column:1/-1;justify-content:flex-end;}}
.rlist{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.rack{display:flex;gap:6px;justify-content:flex-end;align-items:flex-end}
.addbox{background:var(--grns);border:1px dashed #B6D0BC;border-radius:var(--r);padding:12px;margin-top:10px}
.itabs{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid var(--ln);margin-bottom:20px}
.itab{background:transparent;border:0;padding:8px 12px;font-family:var(--f);font-size:.84rem;font-weight:500;color:var(--inkm);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.itab:hover{color:var(--ink)}.itab.active{color:var(--grnd);border-bottom-color:var(--gld)}
.narr{background:var(--bgc);border:1px solid var(--ln);border-left:3px solid var(--gld);padding:18px 22px;border-radius:var(--r);font-family:var(--fs);font-size:1rem;line-height:1.55;color:var(--ink)}
.narr p{margin:0}.narr.g{border-left-color:var(--grn)}
.nxts{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
.nxt{padding:18px;border:1px solid var(--ln);border-radius:var(--r);background:var(--bgc)}
.nxt-n{font-family:var(--fs);font-size:2.2rem;color:var(--gld);line-height:1;margin-bottom:6px;opacity:.65}
.nxt h4{font-size:.9rem;margin:0 0 5px;color:var(--grnd);font-weight:600;font-family:var(--f)}
.nxt p{font-size:.84rem;color:var(--inks);margin:0}
.acct-card{background:var(--bgc);border:1px solid var(--ln);border-radius:var(--r);margin-bottom:14px}
.acct-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--ln);background:var(--grns);border-radius:var(--r) var(--r) 0 0}
.acct-body{padding:14px 16px}
.banner{padding:10px 14px;border-radius:var(--r);font-size:.88rem;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.banner.ok{background:var(--grns);color:var(--grnd);border:1px solid #C8DCC9}
.banner.warn{background:var(--glds);color:#6B4F0E;border:1px solid #E0CB85}
.banner.err{background:var(--reds);color:var(--red);border:1px solid #E5C2BD}
.login-shell{min-height:60vh;display:grid;place-items:center;padding:40px 20px}
.login-card{width:100%;max-width:400px;background:var(--bgc);border:1px solid var(--ln);border-radius:var(--rl);padding:32px;box-shadow:var(--sh);text-align:center}
.login-card h2{color:var(--grnd);margin-bottom:8px}
.login-logo{width:54px;height:54px;border-radius:50%;overflow:hidden;margin:0 auto 14px;border:2px solid var(--grns)}
.login-logo img{width:100%;height:100%;object-fit:cover}
.etxt{color:var(--red);font-size:.82rem;margin-top:6px}
.chart-w{position:relative}.chart-w.dn{height:230px}.chart-w.wf{height:260px}.chart-w.lg{height:300px}
.spacer{height:20px}
.fb{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fbw{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.muted{color:var(--inkm)}
.empty-s{text-align:center;padding:40px 20px;color:var(--inkm)}
.empty-s h3{font-family:var(--fs);margin-bottom:8px;color:var(--inks)}
.hidden{display:none!important}
.ver{position:fixed;bottom:8px;right:12px;font-size:.65rem;color:var(--inkm);letter-spacing:.08em;z-index:50;pointer-events:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--grnd);color:#fff;padding:10px 20px;border-radius:999px;font-size:.88rem;box-shadow:var(--sh);z-index:200;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}

.ptr-indicator{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--grnd);color:#fff;padding:8px 18px;border-radius:0 0 999px 999px;font-size:.8rem;z-index:500;transition:transform .25s ease;display:flex;align-items:center;gap:8px}
.ptr-indicator.visible{transform:translateX(-50%) translateY(0)}
.ptr-indicator svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;animation:ptr-spin 1s linear infinite}

@media(max-width:500px){.brand-name{font-size:.85rem}.month-sel label{display:none}.view-toggle button{padding:5px 8px;font-size:.65rem}.hdr-controls{gap:4px}}
@media(max-width:599px){
  .tb-share-btn span{display:none}
  .tb-share-btn{padding:5px 7px!important;min-width:28px;justify-content:center}
  .tb-pdf-btn{padding:4px 8px!important;font-size:.72rem!important}
  .pg-toolbar .month-sel-inline{padding:3px 5px 3px 7px}
  .pg-toolbar .month-sel-inline label{font-size:.6rem;letter-spacing:.06em}
  .pg-toolbar .month-sel-inline select{font-size:.72rem}
  .pg-toolbar .vt-inline button{padding:4px 7px;font-size:.62rem}
  .pg-toolbar{gap:6px;margin-bottom:14px}
}
@keyframes ptr-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sw-banner{background:var(--glds);color:#6B4F0E;text-align:center;padding:8px 16px;font-size:.84rem;border-bottom:1px solid #E0CB85}
.modal-bg{position:fixed;inset:0;background:rgba(10,20,15,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal{background:var(--bgc);border-radius:var(--rl);box-shadow:0 16px 48px rgba(10,20,15,.22);max-width:680px;width:100%;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--ln);flex-shrink:0}
.modal-hdr h3{color:var(--grnd);margin:0}
.modal-close{background:transparent;border:0;cursor:pointer;color:var(--inkm);font-size:1.4rem;line-height:1;padding:4px 8px;border-radius:6px}
.modal-close:hover{background:var(--ln);color:var(--ink)}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.ka-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:4px}
.ka-item{background:var(--bgc);border:1px solid var(--ln);border-radius:var(--r);padding:14px 16px;border-left:3px solid var(--grn)}
.ka-item h4{font-size:.88rem;font-weight:600;color:var(--grnd);margin:0 0 3px;font-family:var(--f)}
.ka-item p{font-size:.82rem;color:var(--inks);margin:0}
.preview-banner{background:linear-gradient(90deg,#1B3B6F,#2a5099);color:#fff;padding:10px 18px;border-radius:var(--r);display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.preview-banner span{font-size:.88rem}
.preview-banner strong{color:var(--glds)}
.ytd-month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:14px}
.ytd-month-card{background:var(--bgc);border:1px solid var(--ln);border-radius:var(--r);overflow:hidden}
.ytd-month-card-hdr{background:var(--grns);padding:10px 14px;font-weight:600;font-size:.88rem;color:var(--grnd);display:flex;justify-content:space-between;align-items:center}
.ytd-month-card-hdr .num{font-size:.9rem}
.ytd-month-card-body{padding:0 14px 10px}
.ytd-month-card-body .stmt{font-size:.82rem}
.ytd-month-card-body .stmt th,.ytd-month-card-body .stmt td{padding:5px 0}
.ytd-details-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px;padding:10px 0;color:var(--grnd);font-weight:600;font-size:.9rem;border-bottom:1px solid var(--ln);margin-bottom:4px}
.ytd-details-toggle svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;transition:transform .2s;flex-shrink:0}
.ytd-details-toggle.open svg{transform:rotate(180deg)}

body.dark{--bg:#061410;--bgc:#0C1E16;--bge:#122018;--ink:#E0EDE6;--inks:#A8C4B0;--inkm:#6B9070;--ln:#1C3028;--lnk:#2A4234;--grns:#0A1E14;--glds:#302800;--reds:#2E1410;--sh:0 4px 16px rgba(0,0,0,.35);--grn:#00A06F;--grnd:#006145;--teal:#009FCC}
body.dark .card{box-shadow:0 1px 4px rgba(0,0,0,.2)}
body.dark .sec-hd h2{color:#7FD4A8}
body.dark .hero-ey{color:#C5E8D0}
body.dark h1,body.dark h2,body.dark h3{color:var(--ink)}
body.dark .metric-card{background:var(--bgc)}
body.dark .mc-lbl{color:var(--inkm)}
body.dark .mc-val{color:var(--ink)}
body.dark .narr{color:var(--ink)}
body.dark .itbl td,.dark .itbl th{color:var(--ink)}
body.dark .stmt td,.dark .stmt th{color:var(--ink)}
body.dark .stmt tr.ind td{color:var(--inks)}
body.dark .pg-toolbar .month-sel-inline,.dark .pg-toolbar .vt-inline{border-color:var(--ln)}
body.dark .pg-toolbar .month-sel-inline label{color:var(--inkm)}
body.dark .pg-toolbar .month-sel-inline select{color:var(--ink)}
body.dark .pg-toolbar .vt-inline button{color:var(--inkm)}
body.dark .nxt h4{color:#7FD4A8}
body.dark .nxt p{color:var(--inks)}
body.dark .ka-item h4{color:#7FD4A8}
body.dark .fld input,body.dark .fld select,body.dark .fld textarea{background:var(--bge);border-color:var(--lnk);color:var(--ink)}
body.dark .stmt tr.clickable:hover td{background:var(--grns)}
body.dark .acct-hdr{background:var(--grns)}
body.dark .login-card,body.dark .modal{background:var(--bgc);border-color:var(--ln)}
body.dark .erow{background:var(--bge)}
.dm-toggle{background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:999px;color:rgba(255,255,255,.8);padding:5px 9px;cursor:pointer;font-size:.78rem;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:background .15s}
.dm-toggle:hover{background:rgba(255,255,255,.12)}
.dm-toggle svg{width:15px;height:15px;flex-shrink:0}

/* ---- PDF preview modal ---- */
.pdf-preview-bg{position:fixed;inset:0;background:rgba(10,20,15,.7);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0;backdrop-filter:blur(3px)}
.pdf-preview-toolbar{width:100%;background:var(--grnd);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;gap:12px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.pdf-preview-toolbar h3{margin:0;font-family:var(--fs);font-size:1rem;font-weight:500}
.pdf-preview-toolbar .fb{gap:8px}
.pdf-preview-frame-wrap{flex:1;width:100%;overflow-y:auto;background:#666;padding:20px;display:flex;flex-direction:column;align-items:center;gap:16px}

/* ── metric cards (second row) ── */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:28px}

.fund-progress{margin-bottom:28px}
.fp-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.fp-title{font-family:var(--fs);font-size:1rem;font-weight:500;color:var(--grnd)}
.fp-pct{font-family:var(--fm);font-size:.85rem;color:var(--inkm)}
.fp-bar-bg{height:10px;background:var(--ln);border-radius:999px;overflow:hidden}

.fp-bar-fill.over{background:linear-gradient(90deg,var(--gld),#FFD740)}
.fp-stats{display:flex;justify-content:space-between;margin-top:6px;font-size:.78rem;color:var(--inkm);flex-wrap:wrap;gap:4px}

.uof-chart-bars{margin-top:10px}
.uof-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.uof-bar-label{font-size:.78rem;color:var(--inks);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uof-bar-track{flex:1;height:8px;background:var(--ln);border-radius:999px;overflow:hidden}
.uof-bar-fill{height:100%;border-radius:999px;transition:width .5s ease}
.uof-bar-amt{font-family:var(--fm);font-size:.75rem;color:var(--inkm);white-space:nowrap;min-width:70px;text-align:right}

<script>
const ADMIN_PASSPHRASE='gbago-admin';
const DEFAULT_REPO='';
const DEFAULT_BRANCH='main';
const APP_VERSION='V1.11.0';

const GEF=(function(){
  const UOF_CATS={jambForm:'JAMB Form',waecForm:'WAEC Form',lesson:'Lesson / Tuition',stipend:'Stipend',scholarship:'Scholarship',gift:'Gift / Donation',other:'Other'};
  function fmtM(v,plain){
    var n=Number(v||0),a=Math.abs(n);
    var f=a.toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
    if(n===0)return plain?'\u2013':'\u2013';
    if(n<0)return plain?'('+f+')':'\u20A6('+f+')';
    return plain?f:'\u20A6'+f;
  }
  function fmtPct(v,d){return(Number(v||0)*100).toFixed(d==null?2:d)+'%';}
  function pLabel(p){if(p.label)return p.label;var m=['January','February','March','April','May','June','July','August','September','October','November','December'];return m[p.month-1]+' '+p.year;}
  function pLabelShort(p){var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[(p.month||1)-1]+' '+(p.year||'');}
  function sum(arr,k){return(arr||[]).reduce(function(a,i){return a+Number((k?i[k]:i)||0);},0);}
  function acctBal(a){return(a.transactions||[]).reduce(function(b,t){if(['deposit','topup','income','rollover'].includes(t.type))return b+Number(t.amount||0);return b-Number(t.amount||0);},Number(a.openingBalance||0));}
  function acctIncome(a){return(a.transactions||[]).filter(function(t){return t.type==='income';}).reduce(function(s,t){return s+Number(t.amount||0);},0);}
  function acctFees(a){return(a.transactions||[]).filter(function(t){return t.type==='fee';}).reduce(function(s,t){return s+Number(t.amount||0);},0);}
  function allAccts(p){return[].concat(p.cashAccounts||[],p.moneyMarketAccounts||[],p.placements||[]);}
  function mergePeriods(periods){
    if(!periods||!periods.length)return null;
    var base=periods[periods.length-1];
    function mergeAccts(cat){
      var acctIds=[].concat.apply([],periods.map(function(p){return(p[cat]||[]).map(function(a){return a.id;});}));
      acctIds=acctIds.filter(function(id,i){return acctIds.indexOf(id)===i;});
      return acctIds.map(function(id){
        // Find earliest appearance of this account for YTD opening cash
        var earliest=null;
        for(var pi=0;pi<periods.length;pi++){earliest=(periods[pi][cat]||[]).find(function(a){return a.id===id;});if(earliest)break;}
        if(!earliest)earliest={id:id,name:id,platform:'',openingBalance:0,transactions:[]};
        var allTxns=[].concat.apply([],periods.map(function(p){return((p[cat]||[]).find(function(a){return a.id===id;})||{transactions:[]}).transactions||[];}));
        // Set openingBalance so acctBal(merged) == last period closing balance.
        // This ensures bs() on merged always matches bs() on the last period (month view).
        var lastAcct=(base[cat]||[]).find(function(a){return a.id===id;})||earliest;
        var lastClose=acctBal(lastAcct);
        var txnEffect=allTxns.reduce(function(s,t){return['deposit','topup','income','rollover'].includes(t.type)?s+Number(t.amount||0):s-Number(t.amount||0);},0);
        var merged=Object.assign({},earliest,{transactions:allTxns,openingBalance:lastClose-txnEffect});
        merged._ytdOpeningBalance=earliest.openingBalance;
        return merged;
      });
    }
    return{id:base.id,label:base.label,year:base.year,month:base.month,
      _isMerged:true,
      donations:[].concat.apply([],periods.map(function(p){return p.donations||[];})),
      otherIncome:[].concat.apply([],periods.map(function(p){return p.otherIncome||[];})),
      useOfFunds:[].concat.apply([],periods.map(function(p){return p.useOfFunds||[];})),
      otherExpenses:[].concat.apply([],periods.map(function(p){return p.otherExpenses||[];})),
      cashAccounts:mergeAccts('cashAccounts'),
      moneyMarketAccounts:mergeAccts('moneyMarketAccounts'),
      placements:mergeAccts('placements'),
      narrative:base.narrative,nextSteps:base.nextSteps,keyActivities:base.keyActivities};
  }
  function pnl(p){
    var don=sum(p.donations,'amount'),oi=sum(p.otherIncome,'amount');
    var invInc=allAccts(p).reduce(function(s,a){return s+acctIncome(a);},0);
    var rev=don+oi+invInc;
    var uofByC={};Object.keys(UOF_CATS).forEach(function(c){uofByC[c]=(p.useOfFunds||[]).filter(function(u){return u.category===c;}).reduce(function(s,u){return s+Number(u.amount||0);},0);});
    var totalUof=sum(p.useOfFunds,'amount'),oe=sum(p.otherExpenses,'amount');
    var fees=allAccts(p).reduce(function(s,a){return s+acctFees(a);},0);
    var exp=totalUof+oe+fees;
    return{donations:don,otherIncome:oi,investmentIncome:invInc,totalRevenue:rev,uofByC:uofByC,totalUof:totalUof,otherExpenses:oe,fees:fees,totalExpenses:exp,netIncome:rev-exp};
  }
  function bs(p){
    var cash=(p.cashAccounts||[]).reduce(function(s,a){return s+acctBal(a);},0);
    var mm=(p.moneyMarketAccounts||[]).reduce(function(s,a){return s+acctBal(a);},0);
    var fd=(p.placements||[]).reduce(function(s,a){return s+acctBal(a);},0);
    return{cash:cash,moneyMarket:mm,placements:fd,totalAssets:cash+mm+fd,netAssets:cash+mm+fd};
  }
  function netCashTransfer(a){
    // Net cash physically moved into a non-cash account (topups/deposits minus withdrawals).
    // Income and fee transactions are internal to the account and never touch the cash balance.
    return(a.transactions||[]).reduce(function(s,t){
      if(t.type==='topup'||t.type==='deposit'||t.type==='rollover')return s+Number(t.amount||0);
      if(t.type==='withdrawal')return s-Number(t.amount||0);
      return s;
    },0);
  }
  function cf(p){
    var r=pnl(p),b=bs(p);
    // For YTD merged periods use _ytdOpeningBalance (year-start) for the opening cash line.
    function ob(a){return Number((p._isMerged?a._ytdOpeningBalance:a.openingBalance)||0);}
    var obCash=(p.cashAccounts||[]).reduce(function(s,a){return s+ob(a);},0);
    var op={don:r.donations,oi:r.otherIncome,uof:-r.totalUof};op.sub=op.don+op.oi+op.uof;
    // inv.inc: only income credited directly to a cash account (e.g. bank interest on current account).
    // MM and FD income stays inside those accounts and is already captured in netMM/netFD.
    // Including it here would create a phantom cash inflow equal to the management fee.
    var cashInvInc=(p.cashAccounts||[]).reduce(function(s,a){return s+acctIncome(a);},0);
    // inv.netMM / netFD: only the cash physically transferred to/from each account.
    // Income and fees within MM/FD are internal and must NOT be counted here.
    var netToMM=(p.moneyMarketAccounts||[]).reduce(function(s,a){return s+netCashTransfer(a);},0);
    var netToFD=(p.placements||[]).reduce(function(s,a){return s+netCashTransfer(a);},0);
    // inv.fees: only fees paid directly from a cash account.
    var cashFees=(p.cashAccounts||[]).reduce(function(s,a){return s+acctFees(a);},0);
    var inv={inc:cashInvInc,netMM:-netToMM,netFD:-netToFD,fees:-cashFees};
    inv.sub=inv.inc+inv.netMM+inv.netFD+inv.fees;
    var openCash=obCash,change=op.sub+inv.sub,computed=openCash+change,booked=b.cash;
    return{op:op,inv:inv,cashChange:change,openCash:openCash,computed:computed,booked:booked,ok:Math.abs(computed-booked)<1};
  }
  function invSum(p){return{total:allAccts(p).reduce(function(s,a){return s+acctBal(a);},0)};}
  function newId(pfx){return(pfx||'x')+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);}
  function blank(yr,mo){return{id:yr+'-'+String(mo).padStart(2,'0'),label:'',year:yr,month:mo,donations:[],otherIncome:[],useOfFunds:[],cashAccounts:[],moneyMarketAccounts:[],placements:[],otherExpenses:[],keyActivities:[],narrative:{incomeStatement:'',balanceSheet:'',cashFlows:'',nextSteps:''},nextSteps:[]};}
  function carry(prev){if(!prev)return null;return{cashAccounts:(prev.cashAccounts||[]).map(function(a){return{id:a.id,platform:a.platform,name:a.name,openingBalance:acctBal(a),transactions:[]};}),moneyMarketAccounts:(prev.moneyMarketAccounts||[]).map(function(a){return{id:a.id,platform:a.platform,name:a.name,openingBalance:acctBal(a),transactions:[]};}),placements:(prev.placements||[]).map(function(a){return{id:a.id,platform:a.platform,name:a.name,rate:a.rate,tenor:a.tenor,startDate:a.startDate,maturityDate:a.maturityDate,openingBalance:acctBal(a),transactions:[]};})};}
  return{UOF_CATS,fmtM,fmtPct,pLabel,pLabelShort,sum,acctBal,acctIncome,acctFees,pnl,bs,cf,invSum,newId,blank,carry,mergePeriods};
})();

// ---- Lightweight markdown renderer (bold, italic, bullets only) ----
function renderMd(text){
  if(!text)return'';
  var escaped=esc(text);
  // Bold
  escaped=escaped.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  // Italic
  escaped=escaped.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  // Bullet lines
  var lines=escaped.split('\n');
  var out='',inList=false;
  lines.forEach(function(line){
    var m=line.match(/^[-*]\s+(.*)/);
    if(m){if(!inList){out+='<ul>';inList=true;}out+='<li>'+m[1]+'</li>';}
    else{if(inList){out+='</ul>';inList=false;}if(line.trim())out+='<p>'+line+'</p>';}
  });
  if(inList)out+='</ul>';
  return out;
}
// ---- Investment yield helper ----
function calcYield(p){
  var allInv=[].concat(p.moneyMarketAccounts||[],p.placements||[]);
  if(!allInv.length)return null;
  var inc=allInv.reduce(function(s,a){return s+GEF.acctIncome(a);},0);
  var avgBal=allInv.reduce(function(s,a){return s+Number(a.openingBalance||0)+GEF.acctBal(a);},0)/2;
  if(!avgBal)return null;
  return(inc/avgBal)*12*100; // annualised %
}
// ---- Beneficiary count helper ----
function countBeneficiaries(p){
  var names=new Set();
  (p.useOfFunds||[]).forEach(function(u){if(u.beneficiary&&u.beneficiary.trim())names.add(u.beneficiary.trim().toLowerCase());});
  return names.size;
}
// ---- Runway helper (months at current spend) ----
function calcRunway(b,r){
  if(!r.totalExpenses||!b.totalAssets)return null;
  return Math.round(b.totalAssets/r.totalExpenses*10)/10;
}
// ---- Cumulative donations helper (all published periods) ----
function calcCumulativeDonations(){
  var total=0;
  Object.values(S.loadedPeriods).forEach(function(p){total+=GEF.sum(p.donations||[],'amount');});
  // Also include current draft period if previewing
  if(S.previewPeriod){total+=GEF.sum(S.previewPeriod.donations||[],'amount');}
  // Deduplicate: only sum from published loaded periods + drafts
  // Reset and sum from all known periods
  total=0;
  var seen=new Set();
  (S.pubIdx&&S.pubIdx.publishedPeriods||[]).forEach(function(pp){
    if(!seen.has(pp.id)){seen.add(pp.id);var loaded=S.loadedPeriods[pp.id];if(loaded)total+=GEF.sum(loaded.donations||[],'amount');}
  });
  Object.keys(S.drafts).forEach(function(id){if(!seen.has(id)){seen.add(id);total+=GEF.sum(S.drafts[id].donations||[],'amount');}});
  return total;
}

function buildSankeyDiagram(wrapperId,c){
  var wrap=document.getElementById(wrapperId);if(!wrap)return;
  var isDark=document.body.classList.contains('dark');
  var W=Math.min(wrap.offsetWidth||600,700),H=320;
  var PAD={l:10,r:10,t:30,b:10},nW=110,nH=34,gap=12;
  var ink=isDark?'#E8E3DA':'#14201A',muted=isDark?'#6B7A68':'#8A8E89',bg=isDark?'#141F17':'#FFFEFB';
  var grn='#0F5132',gld='#C99A2E',red='#A33A2E',nvy='#1B3B6F';
  var fmt=function(v){return'₦'+(Math.abs(Number(v))/1000).toFixed(0)+'k';};

  // Nodes: sources -> operating -> net cash -> closing
  var ops=[
    {id:'don',l:'Donations',v:c.op.don,c:grn},
    {id:'oi',l:'Other Income',v:c.op.oi,c:gld},
    {id:'ii',l:'Inv. Income',v:c.inv.inc,c:gld},
  ].filter(function(n){return n.v>0;});
  var outs=[
    {id:'uof',l:'Deployments',v:Math.abs(c.op.uof),c:red},
    {id:'mm',l:'MM Movement',v:Math.abs(c.inv.netMM),c:nvy,pos:c.inv.netMM>=0},
    {id:'fd',l:'FD Movement',v:Math.abs(c.inv.netFD),c:nvy,pos:c.inv.netFD>=0},
    {id:'fees',l:'Fees',v:Math.abs(c.inv.fees),c:red},
  ].filter(function(n){return n.v>0;});

  if(!ops.length&&!outs.length){wrap.innerHTML='<p style="color:var(--inkm);font-size:.85rem;padding:12px 0;text-align:center;">No cash flow data for this period.</p>';return;}
  var totalIn=ops.reduce(function(s,n){return s+n.v;},0);
  var netCash=c.cashChange;
  var opening=c.openCash;
  var closing=c.booked;

  // Layout: 4 columns
  var col0x=PAD.l, col1x=PAD.l+nW+60, col2x=col1x+nW+60, col3x=col2x+nW+60;
  var totalW=col3x+nW+PAD.r;
  if(totalW>W){var scale=W/totalW;col0x*=scale;col1x*=scale;col2x*=scale;col3x*=scale;nW*=scale;}

  // Y positions for source nodes
  var srcTotal=Math.max(totalIn,1);
  var srcY=PAD.t,srcNodes=ops.map(function(n){var h=Math.max(20,(n.v/srcTotal)*(H-PAD.t-PAD.b-ops.length*gap));var node=Object.assign({x:col0x,y:srcY,h:h},n);srcY+=h+gap;return node;});
  // Central node
  var ctrH=Math.min(H-PAD.t-PAD.b,Math.max(30,(totalIn/srcTotal)*(H-PAD.t-PAD.b)));
  var ctrY=PAD.t+(H-PAD.t-PAD.b-ctrH)/2;
  // Out nodes
  var outTotal=Math.max(outs.reduce(function(s,n){return s+n.v;},1),1);
  var outY=PAD.t,outNodes=outs.map(function(n){var h=Math.max(20,(n.v/outTotal)*(H-PAD.t-PAD.b-outs.length*gap));var node=Object.assign({x:col2x,y:outY,h:h},n);outY+=h+gap;return node;});
  // Closing node
  var closeH=Math.max(24,ctrH*0.5);
  var closeY=ctrY+(ctrH-closeH)/2;

  function bezier(x1,y1,x2,y2,color,alpha,strokeW){
    var mx=(x1+x2)/2;
    return '<path d="M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2+'" fill="none" stroke="'+color+'" stroke-opacity="'+(alpha||0.28)+'" stroke-width="'+(strokeW||8)+'"/>';
  }

  var svg='<svg viewBox="0 0 '+totalW+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:'+totalW+'px;height:'+H+'px;display:block;">';
  
  // Flow lines: sources -> central
  var srcFlowY=ctrY;
  srcNodes.forEach(function(n){
    var flowH=Math.max(4,(n.v/Math.max(totalIn,1))*ctrH);
    svg+=bezier(n.x+nW,n.y+n.h/2,col1x,srcFlowY+flowH/2,n.c,0.22,Math.max(4,flowH));
    srcFlowY+=flowH;
  });

  // Flow lines: central -> outs
  var outFlowY=ctrY;
  outNodes.forEach(function(n){
    var flowH=Math.max(4,(n.v/Math.max(outTotal,1))*ctrH);
    svg+=bezier(col1x+nW,outFlowY+flowH/2,n.x,n.y+n.h/2,n.c,0.22,Math.max(4,flowH));
    outFlowY+=flowH;
  });

  // Flow: central -> closing (net)
  if(Math.abs(netCash)>0){
    svg+=bezier(col1x+nW,ctrY+ctrH/2,col3x,closeY+closeH/2,netCash>=0?grn:red,0.3,Math.max(6,closeH));
  }

  // Draw nodes
  function drawNode(x,y,w,h,color,label,value,light){
    var r=6;
    svg+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="'+r+'" fill="'+color+'" opacity="0.15"/>';
    svg+='<rect x="'+x+'" y="'+y+'" width="4" height="'+h+'" rx="2" fill="'+color+'"/>';
    var midY=y+h/2;
    svg+='<text x="'+(x+10)+'" y="'+(midY-5)+'" font-family="Geist,sans-serif" font-size="9" fill="'+muted+'" dominant-baseline="auto">'+label+'</text>';
    svg+='<text x="'+(x+10)+'" y="'+(midY+9)+'" font-family="Geist Mono,monospace" font-size="11" font-weight="600" fill="'+ink+'" dominant-baseline="auto">'+value+'</text>';
  }

  srcNodes.forEach(function(n){drawNode(n.x,n.y,nW,n.h,n.c,n.l,fmt(n.v));});
  drawNode(col1x,ctrY,nW,ctrH,grn,'Total Inflows',fmt(totalIn));
  outNodes.forEach(function(n){drawNode(n.x,n.y,nW,n.h,n.c,n.l,fmt(n.v));});
  drawNode(col3x,closeY,nW,closeH,netCash>=0?grn:red,'Closing Cash',fmt(closing));

  // Opening label
  svg+='<text x="'+col3x+'" y="'+(closeY-6)+'" font-family="Geist,sans-serif" font-size="9" fill="'+muted+'">Opening: '+fmt(opening)+'</text>';

  svg+='</svg>';
  wrap.innerHTML=svg;
}

var DL_PLUGIN={id:'dataLabels',afterDatasetsDraw:function(chart){
  var ctx=chart.ctx;
  var type=chart.config.type;
  chart.data.datasets.forEach(function(ds,di){
    var meta=chart.getDatasetMeta(di);
    if(meta.hidden||ds.label==='_b')return;
    if(type==='doughnut'||type==='pie'){
      // Draw percentage label in each segment
      var total=ds.data.reduce(function(s,v){return s+Number(v||0);},0);
      if(!total)return;
      meta.data.forEach(function(arc,idx){
        var val=Number(ds.data[idx]||0);
        if(!val)return;
        var pct=Math.round(val/total*100);
        if(pct<5)return; // skip tiny slices
        var angle=(arc.startAngle+arc.endAngle)/2;
        var r=(arc.innerRadius+arc.outerRadius)/2;
        var x=arc.x+Math.cos(angle)*r;
        var y=arc.y+Math.sin(angle)*r;
        ctx.save();ctx.fillStyle='#fff';ctx.font='600 10px Geist,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(pct+'%',x,y);ctx.restore();
      });
    } else if(type==='line'){
      // Draw value labels above each point
      meta.data.forEach(function(pt,idx){
        var val=ds.data[idx];
        if(val==null)return;
        var lbl='\u20A6'+(Math.abs(Number(val))/1000).toFixed(0)+'k';
        ctx.save();ctx.fillStyle='#004D37';ctx.font='600 10px Geist,sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillText(lbl,pt.x,pt.y-6);ctx.restore();
      });
    } else {
      // Bar / waterfall labels
      meta.data.forEach(function(bar,idx){
        var val=ds.data[idx];
        if(!val&&val!==0)return;
        var x=bar.x,y=bar.y;
        var isNeg=Number(val)<0;
        var lbl='\u20A6'+(Math.abs(Number(val))/1000).toFixed(0)+'k';
        ctx.save();ctx.fillStyle=isNeg?'#A33A2E':'#004D37';ctx.font='600 10px Geist,sans-serif';ctx.textAlign='center';
        ctx.fillText(lbl,x,isNeg?y+14:y-6);ctx.restore();
      });
    }
  });
}};

function showBreakdown(key,p,r){
  function makeTable(cols,data,sortKey){
    if(!data||!data.length)return'<p style="color:var(--inkm);font-style:italic;">No entries.</p>';
    var sorted=sortKey?data.slice().sort(function(a,b){return(a[sortKey]||'').localeCompare(b[sortKey]||'')}):data;
    var h='<table class="itbl"><thead><tr>'+cols.map(function(c){return'<th'+(c.r?' class="r"':'')+'>'+c.l+'</th>';}).join('')+'</tr></thead><tbody>';
    sorted.forEach(function(item){h+='<tr>'+cols.map(function(c){var v=item[c.k];if(c.fmt==='money')return'<td class="r">\u20A6'+GEF.fmtM(v,true)+'</td>';return'<td>'+esc(v||'')+'</td>';}).join('')+'</tr>';});
    var amtKey=cols[cols.length-1].k;
    var tot=data.reduce(function(s,i){return s+Number(i[amtKey]||0);},0);
    h+='<tr class="tot"><td colspan="'+(cols.length-1)+'">Total</td><td class="r">\u20A6'+GEF.fmtM(tot,true)+'</td></tr>';
    return h+'</tbody></table>';
  }
  function acctDetail(accounts){
    if(!accounts||!accounts.length)return'<p style="color:var(--inkm);font-style:italic;">No accounts.</p>';
    var h='';
    accounts.forEach(function(a){
      h+='<div style="margin-bottom:16px;"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;"><strong>'+esc(a.name)+'</strong><span style="font-family:var(--fm);font-size:.9rem;">\u20A6'+GEF.fmtM(GEF.acctBal(a),true)+'</span></div>';
      if((a.transactions||[]).length){
        h+='<table class="itbl"><thead><tr><th>Date</th><th>Type</th><th>Note</th><th class="r">Amount</th></tr></thead><tbody>';
        a.transactions.slice().sort(function(x,y){return(x.date||'').localeCompare(y.date||'');}).forEach(function(t){
          var out=['withdrawal','fee'].includes(t.type);
          h+='<tr><td>'+esc(t.date||'')+'</td><td>'+esc(t.type)+'</td><td>'+esc(t.note||'')+'</td><td class="r'+(out?' neg':'')+'">'+GEF.fmtM(out?-t.amount:t.amount)+'</td></tr>';
        });
        h+='</tbody></table>';
      }else h+='<p style="font-size:.82rem;color:var(--inkm);margin:4px 0;font-style:italic;">No transactions this period.</p>';
      h+='</div>';
    });
    return h;
  }
  var title='',body='';
  if(key==='donations'){title='Donations';body=makeTable([{k:'date',l:'Date'},{k:'donor',l:'Donor'},{k:'note',l:'Note'},{k:'amount',l:'Amount',r:true,fmt:'money'}],p.donations||[],'date');}
  else if(key==='otherIncome'){title='Other Income';body=makeTable([{k:'date',l:'Date'},{k:'description',l:'Description'},{k:'amount',l:'Amount',r:true,fmt:'money'}],p.otherIncome||[],'date');}
  else if(key==='otherExpenses'){title='Other Expenses';body=makeTable([{k:'date',l:'Date'},{k:'description',l:'Description'},{k:'amount',l:'Amount',r:true,fmt:'money'}],p.otherExpenses||[],'date');}
  else if(key==='useOfFunds'){title='Use of Funds';body=makeTable([{k:'date',l:'Date'},{k:'category',l:'Category'},{k:'beneficiary',l:'Beneficiary'},{k:'description',l:'Description'},{k:'amount',l:'Amount',r:true,fmt:'money'}],(p.useOfFunds||[]).map(function(u){return Object.assign({},u,{category:GEF.UOF_CATS[u.category]||u.category})}),'date');}
  else if(key&&key.startsWith('uof:')){var cat=key.split(':')[1];title=GEF.UOF_CATS[cat]||cat;body=makeTable([{k:'date',l:'Date'},{k:'beneficiary',l:'Beneficiary'},{k:'description',l:'Description'},{k:'amount',l:'Amount',r:true,fmt:'money'}],(p.useOfFunds||[]).filter(function(u){return u.category===cat;}),'date');}
  else if(key==='investmentIncome'){
    title='Investment Income';
    var incRows=[];
    [].concat(p.cashAccounts||[],p.moneyMarketAccounts||[],p.placements||[]).forEach(function(a){(a.transactions||[]).filter(function(t){return t.type==='income';}).forEach(function(t){incRows.push({date:t.date,account:a.name,note:t.note||'',amount:t.amount});});});
    body=makeTable([{k:'date',l:'Date'},{k:'account',l:'Account'},{k:'note',l:'Note'},{k:'amount',l:'Amount',r:true,fmt:'money'}],incRows,'date');
  }
  else if(key==='fees'){
    title='Charges & Fees';
    var feeRows=[];
    [].concat(p.cashAccounts||[],p.moneyMarketAccounts||[],p.placements||[]).forEach(function(a){(a.transactions||[]).filter(function(t){return t.type==='fee';}).forEach(function(t){feeRows.push({date:t.date,account:a.name,note:t.note||'',amount:t.amount});});});
    (p.otherExpenses||[]).forEach(function(e){feeRows.push({date:e.date,account:'Other',note:e.description||'',amount:e.amount});});
    body=makeTable([{k:'date',l:'Date'},{k:'account',l:'Account'},{k:'note',l:'Note'},{k:'amount',l:'Amount',r:true,fmt:'money'}],feeRows,'date');
  }
  else if(key==='cashAccounts'){title='Cash & Savings';body=acctDetail(p.cashAccounts||[]);}
  else if(key==='moneyMarketAccounts'){title='Money Market Funds';body=acctDetail(p.moneyMarketAccounts||[]);}
  else if(key==='placements'){title='Fixed Deposits & Placements';body=acctDetail(p.placements||[]);}
  else return;
  showModal(title,body);
}

// ---- Statement builder ----
function buildStmt(rows,period){
  var html='<table class="stmt"><tbody>';
  var firstHeader=true;
  rows.forEach(function(row){
    if(row.h!==undefined){
      var pad=firstHeader?'':'padding-top:4px;';
      firstHeader=false;
      html+='<tr class="stmt-hd-row"><td style="'+pad+'font-weight:700;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;">'+row.h+'</td><td class="r" style="'+pad+'font-size:.82rem;letter-spacing:.04em;">'+(row.col||'')+'</td></tr>';
      return;
    }
    var cls=row.ind?'ind':'';if(row.tot)cls='tot';if(row.gt)cls='gt';
    var neg=row.v<0;
    var vhtml;
    if(row.dz&&row.v===0)vhtml='<span class="dash">\u2014</span>';
    else vhtml=GEF.fmtM(row.v);
    var clickAttr=row.click?' data-click="'+row.click+'"':'';
    var clickCls=row.click?' clickable':'';
    html+='<tr class="'+cls+clickCls+'"'+clickAttr+'><td>'+row.l+'</td><td class="r'+(neg?' neg':'')+'">'+vhtml+'</td></tr>';
  });
  return html+'</tbody></table>';
}

    var allIds=Array.from(new Set(Object.keys(S.drafts).concat((S.pubIdx&&S.pubIdx.publishedPeriods||[]).map(function(x){return x.id;})))).filter(function(x){return x<p.id;}).sort();

// Auto-log a transaction to a cash account
function logCashTxn(p,acctId,txnType,amount,date,note){
  if(!acctId)return null;
  var acct=(p.cashAccounts||[]).find(function(a){return a.id===acctId;});
  if(!acct)return null;
  if(!acct.transactions)acct.transactions=[];
  var txnId=GEF.newId('txn');
  acct.transactions.push({id:txnId,date:date||'',type:txnType,amount:Number(amount)||0,note:note||''});
  return txnId;
}

// ---- Admin field validation ----
function validateAmount(input){
  var v=Number(input.value);
  var bad=isNaN(v)||v<0;
  input.classList.toggle('invalid',bad);
  var err=input.parentElement.querySelector('.field-err');
  if(err){err.classList.toggle('show',bad);if(bad)err.textContent='Amount must be a positive number';}
  return!bad;
}
function attachAmountValidation(el){

    var errDiv=document.createElement('div');errDiv.className='field-err';

    inp.addEventListener('blur',function(){validateAmount(inp);});
    inp.addEventListener('input',function(){if(inp.classList.contains('invalid'))validateAmount(inp);});
  });
}

// Generic line-section builder with optional cash-account logging
function buildCashLsec(spec){
  var card=document.createElement('div');card.className='card';card.style.marginBottom='16px';
  var p=S.aperiod;var items=(p&&p[spec.cat])||[];var total=GEF.sum(items,'amount');
  var hasCash=(p.cashAccounts||[]).length>0;
  card.innerHTML='<div class="fbw" style="margin-bottom:6px;"><h3>'+spec.title+'</h3><div class="muted num" style="font-size:.9rem;">\u20A6'+GEF.fmtM(total,true)+'</div></div>'
    +'<p class="muted" style="font-size:.82rem;margin-bottom:6px;">'+spec.sub+'</p>';
  var rl=document.createElement('div');rl.className='rlist';
  if(!items.length){var em=document.createElement('div');em.className='muted';em.style.cssText='font-size:.84rem;font-style:italic;padding:6px 0;';em.textContent='No entries.';rl.appendChild(em);}
  items.forEach(function(item){
    var row=document.createElement('div');row.className='erow';
    var colDefs=spec.cols.map(function(c){return c.w||'1fr';});
    if(hasCash)colDefs.push('150px');
    colDefs.push('70px');
    row.style.gridTemplateColumns=colDefs.join(' ');
    spec.cols.forEach(function(col){
      var fld=document.createElement('div');fld.className='fld';fld.innerHTML='<label>'+col.l+'</label>';
      var inp=document.createElement('input');inp.type=col.t;if(col.t==='number')inp.step='0.01';inp.value=item[col.k]!=null?item[col.k]:'';
      inp.addEventListener('input',function(e){item[col.k]=col.t==='number'?Number(e.target.value||0):e.target.value;autoSave();if(col.k==='amount')card.querySelector('.muted.num').textContent='\u20A6'+GEF.fmtM(GEF.sum(p[spec.cat],'amount'),true);});
      fld.appendChild(inp);row.appendChild(fld);
    });
    if(hasCash){
      var caFld=document.createElement('div');caFld.className='fld';caFld.innerHTML='<label>Cash account</label>';
      var casel=document.createElement('select');casel.innerHTML=cashAccountOpts(p,item._cashAcct||'');
      casel.addEventListener('change',function(e){item._cashAcct=e.target.value;autoSave();});
      caFld.appendChild(casel);row.appendChild(caFld);
    }
    var act=document.createElement('div');act.className='rack';
    var del=document.createElement('button');del.className='btn sm dng';del.textContent='Remove';
    del.addEventListener('click',function(){p[spec.cat]=p[spec.cat].filter(function(x){return x.id!==item.id;});autoSave();renderAdmPeriodEditor();});
    act.appendChild(del);row.appendChild(act);rl.appendChild(row);
  });
  card.appendChild(rl);
  var bRow=document.createElement('div');bRow.style.display='flex';bRow.style.gap='8px';bRow.style.marginTop='10px';
  var ab=document.createElement('button');ab.className='btn sm';ab.textContent=spec.addLbl;
  ab.addEventListener('click',function(){if(!p[spec.cat])p[spec.cat]=[];var fr={};spec.cols.forEach(function(c){fr[c.k]=c.t==='number'?0:'';});fr.id=GEF.newId(spec.cat);fr._cashAcct='';p[spec.cat].push(fr);autoSave();renderAdmPeriodEditor();});
  bRow.appendChild(ab);
  if(hasCash&&spec.txnType){
    var logBtn=document.createElement('button');logBtn.className='btn sm gh';logBtn.textContent='Log all to cash accounts';
    logBtn.addEventListener('click',function(){
      var n=0,sk=0;
      (p[spec.cat]||[]).forEach(function(item){
        if(item._cashAcct&&item.amount){
          if(item._loggedTxnId){sk++;return;}
          var tid=logCashTxn(p,item._cashAcct,spec.txnType,item.amount,item.date,spec.txnNote(item));
          item._loggedTxnId=tid;n++;
        }
      });
      autoSave();
      var msg=n+' entr'+(n===1?'y':'ies')+' logged';if(sk)msg+=' ('+sk+' skipped)';
      toast(msg,'ok');renderAdmPeriodEditor();
    });
    bRow.appendChild(logBtn);
  }
  card.appendChild(bRow);return card;
}

// cashTypes: array of txn types that show a cash account picker (e.g. deposits/withdrawals that move cash).
// cashTypeMap: maps each cashType to the counterpart cash txn type.
//   e.g. {topup:'withdrawal'} means topping up an MM fund withdraws from cash.
function renderTxnList(containerId,acct,types,typeLabels,cashTypes,cashTypeMap){
  var wrap=document.getElementById(containerId);if(!wrap)return;wrap.innerHTML='';
  if(!(acct.transactions||[]).length){wrap.innerHTML='<div class="muted" style="font-size:.82rem;font-style:italic;padding:4px 0;">No transactions.</div>';return;}
  var p=S.aperiod;
  var hasCash=cashTypes&&cashTypes.length&&(p.cashAccounts||[]).length>0;
  var sorted=acct.transactions.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');});
  sorted.forEach(function(txn){
    var showPicker=hasCash&&cashTypes.includes(txn.type);
    var row=document.createElement('div');row.className='erow';
    row.style.gridTemplateColumns=showPicker?'120px 140px 130px 1fr 150px 70px':'130px 150px 140px 1fr 70px';
    row.innerHTML='<div class="fld"><label>Txn Date</label><input type="date" value="'+esc(txn.date||'')+'"/></div>'
      +'<div class="fld"><label>Type</label><select>'+types.map(function(t){return'<option value="'+t+'"'+(txn.type===t?' selected':'')+'>'+typeLabels[t]+'</option>';}).join('')+'</select></div>'
      +'<div class="fld"><label>Amount</label><input type="number" step="0.01" value="'+txn.amount+'"/></div>'
      +'<div class="fld"><label>Note</label><input type="text" value="'+esc(txn.note||'')+'"/></div>'
      +(showPicker?'<div class="fld"><label>Cash account</label><select data-ca>'+cashAccountOpts(p,txn._cashAcct||'')+'</select></div>':'')
      +'<div class="rack"><button class="btn sm dng">Remove</button></div>';
    var inputs=row.querySelectorAll('input,select');
    inputs[0].addEventListener('input',function(e){txn.date=e.target.value;autoSave();});
    inputs[1].addEventListener('change',function(e){
      txn.type=e.target.value;autoSave();
      // Re-render so picker shows/hides based on new type
      renderTxnList(containerId,acct,types,typeLabels,cashTypes,cashTypeMap);
    });
    inputs[2].addEventListener('input',function(e){txn.amount=Number(e.target.value||0);autoSave();});
    inputs[3].addEventListener('input',function(e){txn.note=e.target.value;autoSave();});
    if(showPicker){
      var casel=row.querySelector('[data-ca]');
      casel.addEventListener('change',function(e){txn._cashAcct=e.target.value;autoSave();});
      // "Log to cash" button
      var logBtn=document.createElement('button');
      logBtn.className='btn sm gh';
      logBtn.style.cssText='margin-top:18px;font-size:.72rem;padding:3px 8px;white-space:nowrap;';
      logBtn.textContent=txn._cashLinkedTxnId?'Re-log':'Log to cash';
      logBtn.title='Mirror this movement to the selected cash account';
      logBtn.addEventListener('click',function(){
        if(!txn._cashAcct){toast('Select a cash account first','err');return;}
        // Determine the cash-side transaction type (opposite direction)
        var cType=(cashTypeMap&&cashTypeMap[txn.type])||
          (['topup','deposit'].includes(txn.type)?'withdrawal':'deposit');
        // Remove any previously linked cash txn (re-log)
        if(txn._cashLinkedTxnId){
          (p.cashAccounts||[]).forEach(function(a){
            a.transactions=(a.transactions||[]).filter(function(t){return t.id!==txn._cashLinkedTxnId;});
          });
        }
        var note=(typeLabels[txn.type]||txn.type)+' \u2013 '+(acct.name||'Investment');
        if(txn.note)note+=': '+txn.note;
        var tid=logCashTxn(p,txn._cashAcct,cType,txn.amount,txn.date,note);
        txn._cashLinkedTxnId=tid;
        autoSave();
        toast('Logged to cash account','ok');
        logBtn.textContent='Re-log';
      });
      var caCell=row.querySelector('[data-ca]').parentNode;
      caCell.appendChild(logBtn);
    }
    row.querySelector('button.dng').addEventListener('click',function(){
      // Clean up linked cash txn on delete
      if(txn._cashLinkedTxnId){
        (p.cashAccounts||[]).forEach(function(a){
          a.transactions=(a.transactions||[]).filter(function(t){return t.id!==txn._cashLinkedTxnId;});
        });
      }
      acct.transactions=acct.transactions.filter(function(t){return t.id!==txn.id;});
      autoSave();renderAdmPeriodEditor();
    });
    wrap.appendChild(row);
  });
}

// ---- Draft / period management ----
function loadDrafts(){try{S.drafts=JSON.parse(localStorage.getItem(LS.DR)||'{}')||{};}catch(e){S.drafts={};}}
function saveDrafts(){localStorage.setItem(LS.DR,JSON.stringify(S.drafts));}
function autoSave(){if(S.aperiod){S.drafts[S.aperiod.id]=S.aperiod;saveDrafts();
  // Keep previewPeriod in sync so financials reflect live edits
  if(S.previewPeriod&&S.previewPeriod.id===S.aperiod.id)S.previewPeriod=S.aperiod;
}}
function saveDraft(){autoSave();toast('Draft saved','ok');}
function deleteDraft(id){if(!confirm('Delete draft for '+id+'?'))return;delete S.drafts[id];saveDrafts();if(S.aperiod&&S.aperiod.id===id)S.aperiod=null;renderAdmin();}
function isPub(id){return S.pubIdx&&(S.pubIdx.publishedPeriods||[]).some(function(p){return p.id===id;});}

function newPeriod(){
  var yr=parseInt(document.getElementById('new-yr').value,10);
  var mo=parseInt(document.getElementById('new-mo').value,10);
  if(!yr||!mo||mo<1||mo>12){toast('Enter a valid year and month','err');return;}
  var id=yr+'-'+String(mo).padStart(2,'0');
  if(S.drafts[id]||isPub(id)){toast('Period '+id+' already exists','err');return;}
  var p=GEF.blank(yr,mo);p.label=GEF.pLabel(p);
  var allIds=Array.from(new Set(Object.keys(S.drafts).concat((S.pubIdx&&S.pubIdx.publishedPeriods||[]).map(function(x){return x.id;})))).filter(function(x){return x<id;}).sort();
  var prevId=allIds[allIds.length-1];
  function proceed(prev){
    if(prev){var c=GEF.carry(prev);if(c){p.cashAccounts=c.cashAccounts;p.moneyMarketAccounts=c.moneyMarketAccounts;p.placements=c.placements;}}
    S.drafts[id]=p;saveDrafts();S.aperiod=p;sessionStorage.setItem(LS.CUR,id);
    renderAdmPeriodList();renderAdmPeriodEditor();
    var msg='Created '+id;if(prev)msg+=' (balances carried from '+prev.id+')';toast(msg,'ok');
  }
  if(prevId){if(S.drafts[prevId])proceed(S.drafts[prevId]);else fetchJSON('data/periods/'+prevId+'.json').then(proceed).catch(function(){proceed(null);});}
  else proceed(null);
}

// ---- GitHub publish ----
async function ghGet(path){if(!S.repo||!S.pat)throw new Error('Configure repo and token first.');var r=await fetch('https://api.github.com/repos/'+S.repo+'/contents/'+path+'?ref='+encodeURIComponent(S.branch),{headers:{Accept:'application/vnd.github+json',Authorization:'token '+S.pat,'X-GitHub-Api-Version':'2022-11-28'}});if(r.status===404)return null;if(!r.ok)throw new Error('GitHub GET '+r.status);return r.json();}
async function ghPut(path,content,msg,sha){if(!S.repo||!S.pat)throw new Error('Configure repo and token first.');var body={message:msg,content:btoa(unescape(encodeURIComponent(content))),branch:S.branch};if(sha)body.sha=sha;var r=await fetch('https://api.github.com/repos/'+S.repo+'/contents/'+path,{method:'PUT',headers:{Accept:'application/vnd.github+json',Authorization:'token '+S.pat,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error('GitHub PUT '+r.status+': '+await r.text());return r.json();}
async function testGH(){toast('Testing connection\u2026','ok');try{var r=await fetch('https://api.github.com/repos/'+S.repo,{headers:{Accept:'application/vnd.github+json',Authorization:'token '+S.pat}});if(!r.ok)throw new Error(r.status);var d=await r.json();toast('Connected: '+d.full_name,'ok');}catch(e){toast('Test failed: '+e.message,'err');}}
async function publish(){
  if(!S.aperiod){toast('No period selected','err');return;}
  if(!S.repo||!S.pat){toast('Configure GitHub settings first','err');return;}
  var cf=GEF.cf(S.aperiod);
  if(!cf.ok&&!confirm('Cash gap: computed '+GEF.fmtM(cf.computed)+' vs booked '+GEF.fmtM(cf.booked)+'. Publish anyway?'))return;
  toast('Publishing\u2026','ok');
  try{
    var pp='data/periods/'+S.aperiod.id+'.json';
    var existing=await ghGet(pp),idxFile=await ghGet('data/index.json');
    var toSave=JSON.parse(JSON.stringify(S.aperiod));toSave.publishedAt=new Date().toISOString();
    await ghPut(pp,JSON.stringify(toSave,null,2),'Publish '+S.aperiod.id,existing&&existing.sha);
    var idx;try{idx=idxFile?JSON.parse(decodeURIComponent(escape(atob(idxFile.content.replace(/\n/g,''))))):S.pubIdx;}catch(e){idx=S.pubIdx;}
    idx.publishedPeriods=(idx.publishedPeriods||[]).filter(function(p){return p.id!==S.aperiod.id;});
    idx.publishedPeriods.push({id:S.aperiod.id,label:S.aperiod.label||GEF.pLabel(S.aperiod),year:S.aperiod.year,month:S.aperiod.month,publishedAt:toSave.publishedAt});
    idx.publishedPeriods.sort(function(a,b){return a.id.localeCompare(b.id);});idx.lastUpdated=new Date().toISOString();
    await ghPut('data/index.json',JSON.stringify(idx,null,2),'Update index for '+S.aperiod.id,idxFile&&idxFile.sha);
    delete S.drafts[S.aperiod.id];saveDrafts();S.pubIdx=idx;
    if(S.previewPeriod&&S.previewPeriod.id===S.aperiod.id)S.previewPeriod=null;
    toast('Published. GitHub Pages may take ~60s to update.','ok');renderAdmPeriodList();loadIndex();
  }catch(e){toast('Publish failed: '+e.message,'err');}
}
async function unpublish(id){
  if(!confirm('Unpublish '+id+'? The period data file will remain on GitHub but will be removed from the index.'))return;
  toast('Unpublishing…','ok');
  try{
    var f=await ghGet('data/index.json');
    if(!f)throw new Error('index.json not found on GitHub. Check your repo and branch settings.');
    var rawContent=f.content.replace(/\n/g,'').replace(/\r/g,'').replace(/\s/g,'');
    var idx;
    try{idx=JSON.parse(decodeURIComponent(escape(atob(rawContent))));}
    catch(parseErr){throw new Error('Could not parse index.json: '+parseErr.message);}
    idx.publishedPeriods=(idx.publishedPeriods||[]).filter(function(p){return p.id!==id;});
    idx.lastUpdated=new Date().toISOString();
    await ghPut('data/index.json',JSON.stringify(idx,null,2),'Unpublish '+id,f.sha);
    S.pubIdx=idx;
    // Remove from local cache too
    delete S.loadedPeriods[id];
    toast('Unpublished '+id,'ok');
    renderAdmPeriodList();
    loadIndex();
  }catch(e){toast('Unpublish failed: '+e.message,'err');}
}
function dlJSON(){if(!S.aperiod)return;var b=new Blob([JSON.stringify(S.aperiod,null,2)],{type:'application/json'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=S.aperiod.id+'.json';a.click();URL.revokeObjectURL(u);}
function importJSON(){var inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var obj=JSON.parse(ev.target.result);if(!obj.id){toast('Invalid file: no id','err');return;}S.drafts[obj.id]=obj;saveDrafts();toast('Imported '+obj.id,'ok');selectAdmPeriod(obj.id);}catch(err){toast('Cannot parse JSON','err');}};r.readAsText(f);});inp.click();}

    titleBar.innerHTML='<div style="border-bottom:3px solid #006145;padding-bottom:10px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;">'
      +'<div style="display:flex;align-items:center;gap:10px;"><img src="icon-192.png" style="width:36px;height:36px;border-radius:50%;object-fit:cover;" alt="GEF"/>'
      +'<div><div style="font-family:Fraunces,serif;font-size:14pt;font-weight:600;color:#004D37;line-height:1.1;">Gbago Endowment Fund</div>'
      +'<div style="font-size:8pt;color:#7A8C7E;letter-spacing:.08em;text-transform:uppercase;margin-top:1px;">'+esc(pageLbl)+' &middot; '+esc(modeLabel)+'</div></div></div>'
      +'<div style="text-align:right;font-size:8pt;color:#7A8C7E;">'+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+'</div>'
      +'</div>';
    wrapper.appendChild(titleBar);wrapper.appendChild(clone);
    // Inject minimal PDF-specific styles into the wrapper
    var styleEl=document.createElement('style');
    styleEl.textContent='.pdf-page .pg-toolbar,.pdf-page .preview-banner{display:none!important}'
      +'.pdf-page .hero{background:#004D37!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#fff!important;border-radius:8px;}'
      +'.pdf-page .stmt th{font-size:8pt;letter-spacing:.06em;text-transform:uppercase;color:#7A8C7E;border-bottom:1px solid #D9E4DC;}'
      +'.pdf-page .stmt tr.gt td{border-top:2px solid #0D1F15;font-family:Fraunces,serif;}'
      +'.pdf-page .stmt tr.tot td{border-top:1px solid #D9E4DC;font-weight:600;}'
      +'.pdf-page .stmt .neg{color:#A33A2E;}'
      +'.pdf-page .sec-hd h2{color:#004D37;}'
      +'.pdf-page .narr{border-left:3px solid #F8C01C;padding:14px 18px;background:#FAFCF9;}'
      +'.pdf-page .narr.g{border-left-color:#006145;}'
      +'.pdf-page .nxt-n{color:#F8C01C;}'
      +'.pdf-page .nxt h4{color:#004D37;}'
      +'.pdf-page .ka-item{border-left:3px solid #006145;}'
      +'.pdf-page .ka-item h4{color:#004D37;}'
      +'.pdf-page .metric-card{border:1px solid #D9E4DC;border-radius:10px;padding:12px 14px;}'
      +'.pdf-page .mc-val{color:#0D1F15;font-family:Fraunces,serif;}'
      +'.pdf-page .mc-val.pos{color:#006145;}'
      +'.pdf-page .mc-val.neg{color:#A33A2E;}';
    wrapper.insertBefore(styleEl,wrapper.firstChild);
    var previewWrap=document.getElementById('pdf-preview-content');
    previewWrap.innerHTML='';previewWrap.appendChild(wrapper);
    var modal=document.getElementById('pdf-preview-modal');
    modal.classList.remove('hidden');
    var pdfNameBase=pdfMode==='dashboard'?'GEF-Dashboard-':'GEF-Report-';
    var pdfName=pdfNameBase+(S.viewMode==='ytd'?dp.year+'-YTD':dp.id)+'.pdf';
    document.getElementById('pdf-close-btn').onclick=function(){modal.classList.add('hidden');previewWrap.innerHTML='';};
    document.getElementById('pdf-download-btn').onclick=function(){
      var btn=document.getElementById('pdf-download-btn');
      btn.disabled=true;btn.textContent='Loading…';
      loadHtml2Pdf(function(err){
        if(err){btn.disabled=false;btn.textContent='Download PDF';toast(err.message,'err');return;}
        btn.textContent='Generating…';
        // Use the PREVIEW wrapper as-is — this guarantees the download matches the preview exactly.
        // Fixed 900px width, scale:1 so html2canvas renders at exactly the same viewport as the preview pane.
        var opt={margin:[12,14,12,14],filename:pdfName,image:{type:'jpeg',quality:0.97},html2canvas:{scale:1.5,useCORS:true,logging:false,windowWidth:900,scrollX:0,scrollY:0},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},pagebreak:{mode:['avoid-all','css','legacy']}};
        html2pdf().set(opt).from(wrapper).save().then(function(){btn.disabled=false;btn.textContent='Download PDF';toast('PDF downloaded','ok');}).catch(function(e){btn.disabled=false;btn.textContent='Download PDF';toast('PDF failed: '+e.message,'err');});
      });
    };
  },pdfDelay);
}

// ---- Dark mode ----
(function(){
  // Moon: filled crescent (shows in LIGHT mode = click to go dark)
  var MOON_ICON='<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75 9.75 9.75 0 0 1 8.25 6a9.718 9.718 0 0 1 .248-2.252A9.756 9.756 0 0 0 2.25 12c0 5.385 4.365 9.75 9.75 9.75 4.184 0 7.766-2.631 9.252-6.348z"/></svg>';
  // Sun: filled circle with rays (shows in DARK mode = click to go light)
  var SUN_ICON='<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.25a.75.75 0 0 1 .75.75v2.25a.75.75 0 0 1-1.5 0V3a.75.75 0 0 1 .75-.75zM7.5 12a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0zM18.894 6.166a.75.75 0 0 0-1.06-1.06l-1.591 1.59a.75.75 0 1 0 1.06 1.061l1.591-1.59zM21.75 12a.75.75 0 0 1-.75.75h-2.25a.75.75 0 0 1 0-1.5H21a.75.75 0 0 1 .75.75zM17.834 18.894a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 1 0-1.061 1.06l1.59 1.591zM12 18a.75.75 0 0 1 .75.75V21a.75.75 0 0 1-1.5 0v-2.25A.75.75 0 0 1 12 18zM7.758 17.303a.75.75 0 0 0-1.061-1.06l-1.591 1.59a.75.75 0 0 0 1.06 1.061l1.591-1.59zM6 12a.75.75 0 0 1-.75.75H3a.75.75 0 0 1 0-1.5h2.25A.75.75 0 0 1 6 12zM6.697 7.757a.75.75 0 0 0 1.06-1.06l-1.59-1.591a.75.75 0 0 0-1.061 1.06l1.59 1.591z"/></svg>';
  function updateDmIcon(dark){var btn=document.getElementById('dm-toggle');if(btn){btn.innerHTML=(dark?SUN_ICON:MOON_ICON);}}
  var dm=document.getElementById('dm-toggle');
  var isDark=localStorage.getItem('gef-dark')==='1';
  if(isDark)document.body.classList.add('dark');
  updateDmIcon(isDark);
  if(dm)dm.addEventListener('click',function(){
    isDark=!isDark;
    document.body.classList.toggle('dark',isDark);
    localStorage.setItem('gef-dark',isDark?'1':'0');
    updateDmIcon(isDark);
    if(S.tab==='settings')renderSettings();
  });
})();

// ---- Pull-to-refresh ----
(function(){
  var startY=0,pulling=false,ptr=document.getElementById('ptr-indicator');
  document.addEventListener('touchstart',function(e){if(window.scrollY===0)startY=e.touches[0].clientY;},{ passive:true});
  document.addEventListener('touchmove',function(e){if(startY&&window.scrollY===0){var dy=e.touches[0].clientY-startY;if(dy>60&&!pulling){pulling=true;ptr&&ptr.classList.add('visible');}}},{ passive:true});
  document.addEventListener('touchend',function(){
    if(pulling){
      setTimeout(function(){
        // Soft reload: refetch index and current period instead of full page reload
        S.loadedPeriods={};
        loadIndex().then(function(){
          if(ptr)ptr.classList.remove('visible');
        }).catch(function(){
          if(ptr)ptr.classList.remove('visible');
        });
      },300);
    }
    startY=0;pulling=false;
  });
})();

// ---- Boot ----
async function boot(){
  document.getElementById('ver-badge').textContent=APP_VERSION;
  S.authed=!!sessionStorage.getItem(LS.AUTH);
  if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'}).then(function(reg){
    reg.addEventListener('updatefound',function(){var nw=reg.installing;nw.addEventListener('statechange',function(){
      if(nw.state==='installed'&&navigator.serviceWorker.controller){
        // Send skip-waiting so new SW activates immediately
        nw.postMessage({type:'SKIP_WAITING'});
        document.getElementById('sw-banner').classList.remove('hidden');
      }
    });});
    // If a waiting SW exists on load, prompt immediately
    if(reg.waiting){reg.waiting.postMessage({type:'SKIP_WAITING'});document.getElementById('sw-banner').classList.remove('hidden');}
    // When SW takes control, do a hard reload to get fresh content
    navigator.serviceWorker.addEventListener('controllerchange',function(){window.location.reload(true);});
  });}
  S.fundTarget=Number(localStorage.getItem(LS.FT)||0);
  await loadIndex();
  // Deep-link: read hash #periodId:mode
  (function(){
    var hash=window.location.hash.replace('#','');
    if(!hash)return;
    var parts=hash.split(':');
    var pid=parts[0],mode=parts[1]||'month';
    if(pid&&S.periods.some(function(p){return p.id===pid;})){
      S.viewMode=mode;
      loadAndRender(pid);
    }
  })();
  // Share button is on report page action bar
  // Offline indicator
  function updateOnline(){document.getElementById('offline-banner').classList.toggle('visible',!navigator.onLine);}
  window.addEventListener('online',updateOnline);window.addEventListener('offline',updateOnline);updateOnline();
  // Bottom nav — use event delegation so tabs never freeze after long use
  var bnavEl=document.getElementById('bottom-nav');
  if(bnavEl){bnavEl.addEventListener('click',function(e){var btn=e.target.closest('[data-tab]');if(btn)setTab(btn.dataset.tab);});}
  // Also wire top tab-nav via delegation
  var topNav=document.querySelector('.tab-nav');
  if(topNav){topNav.addEventListener('click',function(e){var btn=e.target.closest('[data-tab]');if(btn)setTab(btn.dataset.tab);});}
  setTab('dashboard');
}
document.addEventListener('DOMContentLoaded',boot);
})();
</script>
